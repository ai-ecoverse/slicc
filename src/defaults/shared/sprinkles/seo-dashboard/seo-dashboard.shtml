<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  display: flex; flex-direction: column; height: 100vh;
  background: var(--s2-bg-base); color: var(--s2-gray-900);
  font-family: var(--s2-font-family); font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ---- Content ---- */
.content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.content-toolbar { height: 48px; border-bottom: 1px solid var(--s2-gray-200); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; gap: 16px; }
.page-title { font-size: 16px; font-weight: 700; white-space: nowrap; }
.preset-group { display: flex; gap: 4px; overflow-x: auto; }
.preset { height: 28px; padding: 0 12px; border-radius: var(--s2-radius-pill); border: 1px solid var(--s2-gray-300); background: var(--s2-bg-elevated); color: var(--s2-gray-700); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 130ms ease; font-family: var(--s2-font-family); white-space: nowrap; }
.preset:hover { border-color: var(--s2-gray-500); color: var(--s2-gray-900); }
.preset.active { background: var(--s2-gray-900); border-color: var(--s2-gray-900); color: var(--s2-gray-25); }
.content-main { flex: 1; overflow-y: auto; }

/* ---- Summary Bar ---- */
.summary-bar {
  display: flex; align-items: center; gap: 24px;
  padding: 16px 24px; border-bottom: 1px solid var(--s2-gray-200);
  background: var(--s2-bg-elevated);
}
.summary-score-block { display: flex; align-items: center; gap: 12px; }
.summary-score-label { font-size: 12px; font-weight: 600; color: var(--s2-gray-600); text-transform: uppercase; letter-spacing: 0.04em; }
.summary-score-value { font-size: 28px; font-weight: 800; line-height: 1; }
.summary-score-max { font-size: 14px; font-weight: 500; color: var(--s2-gray-400); }
.summary-meter { width: 200px; height: 6px; background: var(--s2-gray-100); border-radius: var(--s2-radius-pill); overflow: hidden; }
.summary-meter-fill { height: 100%; border-radius: var(--s2-radius-pill); transition: width 300ms ease, background 300ms ease; }
.summary-stat { display: flex; flex-direction: column; gap: 1px; }
.summary-stat-value { font-size: 18px; font-weight: 700; }
.summary-stat-label { font-size: 11px; color: var(--s2-gray-600); font-weight: 500; }
.summary-sep { width: 1px; height: 32px; background: var(--s2-gray-200); }

/* ---- Audit Table ---- */
.audit-table-wrap { padding: 0; }
.audit-table { width: 100%; border-collapse: collapse; }
.audit-table th {
  text-align: left; font-size: 11px; font-weight: 600; color: var(--s2-gray-600);
  text-transform: uppercase; letter-spacing: 0.04em;
  padding: 10px 16px; border-bottom: 1px solid var(--s2-gray-200);
  cursor: pointer; user-select: none; white-space: nowrap;
  transition: color 130ms ease; position: relative;
}
.audit-table th:hover { color: var(--s2-gray-900); }
.audit-table th .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.3; }
.audit-table th.sort-active { color: var(--s2-accent); }
.audit-table th.sort-active .sort-arrow { opacity: 1; color: var(--s2-accent); }
.audit-table td { padding: 0 16px; height: 40px; border-bottom: 1px solid var(--s2-gray-100); font-size: 13px; vertical-align: middle; }
.audit-table tr { transition: background 130ms ease; cursor: pointer; }
.audit-table tbody tr:nth-child(even) { background: var(--s2-gray-50); }
.audit-table tbody tr:hover { background: var(--s2-gray-75); }
.audit-table tbody tr.selected { background: color-mix(in srgb, var(--s2-accent) 6%, transparent); }
.audit-table tbody tr.selected td:first-child { box-shadow: inset 3px 0 0 var(--s2-accent); }

.status-icon { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: var(--s2-radius-pill); font-size: 11px; font-weight: 700; }
.status-pass { color: var(--s2-positive); }
.status-warn { color: var(--s2-notice); }
.status-fail { color: var(--s2-negative); }

.mini-meter { display: inline-flex; align-items: center; gap: 8px; }
.mini-meter-bar { width: 60px; height: 4px; background: var(--s2-gray-100); border-radius: var(--s2-radius-pill); overflow: hidden; }
.mini-meter-fill { height: 100%; border-radius: var(--s2-radius-pill); transition: width 300ms ease, background 300ms ease; }
.mini-meter-num { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 24px; }

/* ---- Detail Panel ---- */
.detail-panel { padding: 24px; border-top: 1px solid var(--s2-gray-200); background: var(--s2-bg-layer-1); animation: slideIn 200ms ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.detail-page-path { font-size: 16px; font-weight: 700; }
.detail-page-score { font-size: 13px; font-weight: 600; padding: 3px 12px; border-radius: var(--s2-radius-pill); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }

.serp-card {
  background: var(--s2-bg-elevated); border-radius: var(--s2-radius-xl);
  box-shadow: var(--s2-shadow-container); padding: 20px; border: 1px solid var(--s2-gray-200);
}
.serp-label { font-size: 11px; font-weight: 600; color: var(--s2-gray-500); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 12px; }
.serp-preview { padding: 16px; background: var(--s2-gray-50); border-radius: var(--s2-radius-default); }
.serp-title { font-size: 18px; color: #1a0dab; text-decoration: underline; line-height: 1.3; cursor: pointer; word-break: break-word; }
.serp-url { font-size: 13px; color: #006621; margin-top: 2px; word-break: break-all; }
.serp-desc { font-size: 13px; color: var(--s2-gray-800); margin-top: 4px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.serp-char-count { font-size: 11px; color: var(--s2-gray-500); margin-top: 8px; font-variant-numeric: tabular-nums; }

.issues-card {
  background: var(--s2-bg-elevated); border-radius: var(--s2-radius-xl);
  box-shadow: var(--s2-shadow-container); padding: 20px; border: 1px solid var(--s2-gray-200);
}
.issues-list { display: flex; flex-direction: column; gap: 8px; }
.issue-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: var(--s2-radius-default);
  background: var(--s2-bg-base); border-left: 3px solid transparent;
}
.issue-item.critical { border-left-color: var(--s2-negative); }
.issue-item.warning { border-left-color: var(--s2-notice); }
.issue-item.pass { border-left-color: var(--s2-positive); }
.issue-icon { flex-shrink: 0; margin-top: 1px; font-size: 13px; font-weight: 700; }
.issue-content { flex: 1; min-width: 0; }
.issue-text { font-size: 13px; color: var(--s2-gray-800); }
.issue-suggestion { font-size: 12px; color: var(--s2-gray-600); margin-top: 2px; }
.btn-autofix {
  height: 24px; padding: 0 10px; border-radius: var(--s2-radius-pill);
  border: 1px solid var(--s2-gray-300); background: var(--s2-bg-elevated);
  color: var(--s2-gray-700); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 130ms ease; font-family: var(--s2-font-family);
  margin-top: 6px; white-space: nowrap;
}
.btn-autofix:hover { border-color: var(--s2-accent); color: var(--s2-accent); background: color-mix(in srgb, var(--s2-accent) 4%, transparent); }

.edit-fields { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 12px; }
.edit-field label { display: block; font-size: 11px; font-weight: 600; color: var(--s2-gray-600); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.edit-field input, .edit-field textarea {
  width: 100%; padding: 8px 12px; border-radius: var(--s2-radius-default);
  border: 1px solid var(--s2-gray-300); font-size: 13px; font-family: var(--s2-font-family);
  color: var(--s2-gray-900); background: var(--s2-bg-elevated);
  transition: border-color 130ms ease; resize: vertical; line-height: 1.5;
}
.edit-field input:focus, .edit-field textarea:focus { outline: none; border-color: var(--s2-accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--s2-accent) 10%, transparent); }
.edit-field .char-indicator { font-size: 11px; margin-top: 3px; font-variant-numeric: tabular-nums; }
.char-good { color: var(--s2-positive); }
.char-warn { color: var(--s2-notice); }
.char-bad { color: var(--s2-negative); }

.no-selection { padding: 48px 24px; text-align: center; color: var(--s2-gray-500); font-size: 13px; }

/* ---- Suggestions Panel ---- */
.suggestions-panel {
  margin-top: 10px; padding: 12px; border-radius: var(--s2-radius-default);
  background: color-mix(in srgb, var(--s2-accent) 4%, transparent);
  border: 1px solid color-mix(in srgb, var(--s2-accent) 20%, transparent);
  animation: slideIn 200ms ease;
}
.suggestions-label { font-size: 11px; font-weight: 600; color: var(--s2-accent); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
.suggestion-option {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  border-radius: var(--s2-radius-default); cursor: pointer;
  transition: background 130ms ease; font-size: 13px; color: var(--s2-gray-800);
}
.suggestion-option:hover { background: color-mix(in srgb, var(--s2-accent) 8%, transparent); }
.suggestion-option .pick-btn {
  flex-shrink: 0; height: 22px; padding: 0 10px; border-radius: var(--s2-radius-pill);
  border: 1px solid var(--s2-accent); background: transparent; color: var(--s2-accent);
  font-size: 11px; font-weight: 600; cursor: pointer; transition: all 130ms ease;
  font-family: var(--s2-font-family);
}
.suggestion-option .pick-btn:hover { background: var(--s2-accent); color: var(--s2-gray-25); }
.suggestion-text { flex: 1; min-width: 0; }

/* ---- Toast ---- */
.toast {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; border-radius: var(--s2-radius-pill);
  font-size: 13px; font-weight: 600; z-index: 100;
  box-shadow: var(--s2-shadow-elevated); animation: toastIn 200ms ease, toastOut 300ms ease 2.7s forwards;
  white-space: nowrap;
}
.toast.success { background: var(--s2-positive); color: var(--s2-gray-25); }
.toast.error { background: var(--s2-negative); color: var(--s2-gray-25); }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ---- Action Bar ---- */
.action-bar { display: flex; gap: 8px; padding: 12px 24px; border-top: 1px solid var(--s2-gray-200); background: var(--s2-bg-layer-1); flex-shrink: 0; }
.action-btn {
  height: 32px; padding: 0 16px; border-radius: var(--s2-radius-pill);
  border: 1px solid var(--s2-gray-300); background: var(--s2-bg-elevated);
  color: var(--s2-gray-700); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 130ms ease; font-family: var(--s2-font-family);
}
.action-btn:hover { border-color: var(--s2-accent); color: var(--s2-accent); }
.action-btn.primary { background: var(--s2-accent); border-color: var(--s2-accent); color: var(--s2-gray-25); }
.action-btn.primary:hover { background: var(--s2-accent-hover); border-color: var(--s2-accent-hover); }
</style>
</head>
<body>

<div class="content-area">
  <div class="content-toolbar">
    <h1 class="page-title">SEO Health</h1>
    <div class="preset-group">
      <button class="preset active" data-preset="current">TAVEX (current)</button>
      <button class="preset" data-preset="fixed">All fixed</button>
      <button class="preset" data-preset="critical">Critical only</button>
      <button class="preset" data-preset="newsite">New site</button>
    </div>
  </div>

  <div class="content-main">
    <div class="summary-bar" id="summaryBar"></div>
    <div class="audit-table-wrap">
      <table class="audit-table">
        <thead id="auditHead"></thead>
        <tbody id="auditBody"></tbody>
      </table>
    </div>
    <div id="detailPanel"></div>
  </div>

  <div class="action-bar">
    <button class="action-btn" onclick="slicc.lick({action:'run-audit'})">Run Audit</button>
    <button class="action-btn primary" onclick="slicc.lick({action:'export-report'})">Export Report</button>
  </div>
</div>

<script>
// ==================== DATA ====================
var PRESETS = {
  current: [
    { path: '/tavex/', name: 'Home', title: 'TAVEX (tavexirel) | AstraZeneca',
      meta: '', h1s: ['TAVEX (tavexirel)'],
      imgs: [{alt: 'TAVEX hero'}, {alt: 'Efficacy chart'}, {alt: ''}],
      internalLinks: 4, traffic: 42 },
    { path: '/tavex/efficacy', name: 'Efficacy', title: 'Efficacy Data \u2014 TAVEX (tavexirel) Clinical Trials RESOLVE-1 and RESOLVE-2 Results',
      meta: 'Clinical efficacy data for TAVEX in rheumatoid arthritis.',
      h1s: ['Efficacy Data', 'Clinical Results'],
      imgs: [{alt: 'ACR20 chart'}, {alt: 'Response rates'}], internalLinks: 3, traffic: 23 },
    { path: '/tavex/safety', name: 'Safety', title: 'Safety',
      meta: 'Safety profile of TAVEX across the RESOLVE clinical programme with adverse event data and monitoring recommendations for healthcare professionals.',
      h1s: ['Safety Profile'], imgs: [{alt: 'Safety data table'}], internalLinks: 2, traffic: 15 },
    { path: '/tavex/dosing', name: 'Dosing', title: 'TAVEX Dosing Guide',
      meta: 'TAVEX 200mg once daily dosing information.',
      h1s: ['Dosing Guide'], imgs: [{alt: 'Tablet photo'}, {alt: 'Dosing table'}], internalLinks: 1, traffic: 10 },
    { path: '/tavex/mechanism-of-action', name: 'Mechanism of Action', title: 'Mechanism of Action \u2014 TAVEX',
      meta: 'How TAVEX selectively inhibits JAK1 to block pro-inflammatory cytokine signalling in rheumatoid arthritis.',
      h1s: ['Mechanism of Action'], imgs: [{alt: 'JAK pathway diagram'}], internalLinks: 3, traffic: 7 },
    { path: '/tavex/prescribing-information', name: 'Prescribing Info', title: 'Prescribing Information',
      meta: 'Full prescribing information for TAVEX including indications, dosage, contraindications, and adverse event reporting.',
      h1s: [], imgs: [], internalLinks: 0, traffic: 3 },
  ],
  fixed: [
    { path: '/tavex/', name: 'Home', title: 'TAVEX (tavexirel) for Rheumatoid Arthritis | AstraZeneca',
      meta: 'Discover TAVEX (tavexirel), a selective JAK1 inhibitor for the treatment of moderate-to-severe rheumatoid arthritis in adults.',
      h1s: ['TAVEX (tavexirel)'], imgs: [{alt: 'TAVEX hero banner'}, {alt: 'Efficacy summary chart'}, {alt: 'Patient testimonial'}],
      internalLinks: 6, traffic: 42 },
    { path: '/tavex/efficacy', name: 'Efficacy', title: 'TAVEX Efficacy Data \u2014 RESOLVE Clinical Trials',
      meta: 'Review clinical efficacy data from RESOLVE-1 and RESOLVE-2 trials for TAVEX in rheumatoid arthritis treatment.',
      h1s: ['Efficacy Data'], imgs: [{alt: 'ACR20 response chart'}, {alt: 'Response rates comparison'}], internalLinks: 4, traffic: 23 },
    { path: '/tavex/safety', name: 'Safety', title: 'TAVEX Safety Profile \u2014 Adverse Events & Monitoring',
      meta: 'Safety profile of TAVEX including adverse event data and monitoring recommendations from the RESOLVE clinical programme.',
      h1s: ['Safety Profile'], imgs: [{alt: 'Safety data summary table'}], internalLinks: 3, traffic: 15 },
    { path: '/tavex/dosing', name: 'Dosing', title: 'TAVEX Dosing Guide \u2014 200mg Once Daily',
      meta: 'Complete dosing information for TAVEX 200mg tablets including administration guidance, dose adjustments, and special populations.',
      h1s: ['Dosing Guide'], imgs: [{alt: 'TAVEX 200mg tablet photo'}, {alt: 'Dosing schedule table'}], internalLinks: 3, traffic: 10 },
    { path: '/tavex/mechanism-of-action', name: 'Mechanism of Action', title: 'How TAVEX Works \u2014 Mechanism of Action',
      meta: 'Learn how TAVEX selectively inhibits JAK1 to block pro-inflammatory cytokine signalling in rheumatoid arthritis.',
      h1s: ['Mechanism of Action'], imgs: [{alt: 'JAK1 pathway diagram'}], internalLinks: 4, traffic: 7 },
    { path: '/tavex/prescribing-information', name: 'Prescribing Info', title: 'TAVEX Full Prescribing Information',
      meta: 'Full prescribing information for TAVEX including indications, dosage, contraindications, and adverse event reporting.',
      h1s: ['Prescribing Information'], imgs: [{alt: 'Prescribing information document'}], internalLinks: 3, traffic: 3 },
  ],
  critical: null,
  newsite: [
    { path: '/tavex/', name: 'Home', title: '', meta: '', h1s: [], imgs: [{alt: ''}, {alt: ''}], internalLinks: 0, traffic: 42 },
    { path: '/tavex/efficacy', name: 'Efficacy', title: 'Efficacy', meta: '', h1s: [], imgs: [{alt: ''}, {alt: ''}], internalLinks: 0, traffic: 23 },
    { path: '/tavex/safety', name: 'Safety', title: '', meta: '', h1s: ['Safety', 'Safety Info'], imgs: [], internalLinks: 0, traffic: 15 },
    { path: '/tavex/dosing', name: 'Dosing', title: 'Dosing', meta: '', h1s: [], imgs: [{alt: ''}], internalLinks: 0, traffic: 10 },
    { path: '/tavex/mechanism-of-action', name: 'Mechanism of Action', title: '', meta: '', h1s: [], imgs: [], internalLinks: 0, traffic: 7 },
    { path: '/tavex/prescribing-information', name: 'Prescribing Info', title: '', meta: '', h1s: [], imgs: [], internalLinks: 0, traffic: 3 },
  ],
};

// ==================== STATE ====================
var pages = [];
var selectedIdx = -1;
var sortCol = 'score';
var sortDir = 'asc';

// ==================== SCORING ====================
function scoreTitle(t) {
  if (!t || t.trim() === '') return { score: 0, status: 'fail', issue: 'Missing page title', fix: null };
  var len = t.length;
  if (len >= 50 && len <= 60) return { score: 25, status: 'pass', issue: null, fix: null };
  if (len >= 40 && len <= 70) return { score: 18, status: 'warn', issue: 'Title length ' + len + ' chars (ideal: 50\u201360)', fix: null };
  if (len < 40) return { score: 10, status: 'warn', issue: 'Title too short (' + len + ' chars, ideal: 50\u201360)', fix: 'Consider expanding to include primary keyword and brand' };
  return { score: 8, status: 'warn', issue: 'Title too long (' + len + ' chars, ideal: 50\u201360)', fix: 'Shorten to under 60 characters' };
}

function scoreMeta(m) {
  if (!m || m.trim() === '') return { score: 0, status: 'fail', issue: 'Missing meta description', fix: 'Add a meta description of 120\u2013160 characters summarizing the page' };
  var len = m.length;
  if (len >= 120 && len <= 160) return { score: 25, status: 'pass', issue: null, fix: null };
  if (len >= 100 && len <= 170) return { score: 18, status: 'warn', issue: 'Meta description ' + len + ' chars (ideal: 120\u2013160)', fix: null };
  if (len < 100) return { score: 10, status: 'warn', issue: 'Meta description too short (' + len + ' chars, ideal: 120\u2013160)', fix: 'Expand meta description to at least 120 characters' };
  return { score: 10, status: 'warn', issue: 'Meta description too long (' + len + ' chars, ideal: 120\u2013160)', fix: 'Shorten meta description to under 160 characters' };
}

function scoreH1s(h1s) {
  if (!h1s || h1s.length === 0) return { score: 0, status: 'fail', issue: 'Missing H1 heading', fix: 'Add a single H1 element that describes the page content' };
  if (h1s.length === 1) return { score: 20, status: 'pass', issue: null, fix: null };
  return { score: 8, status: 'warn', issue: 'Multiple H1 headings (' + h1s.length + ')', fix: 'Consolidate to a single H1 heading' };
}

function scoreAltText(imgs) {
  if (!imgs || imgs.length === 0) return { score: 15, status: 'pass', issue: null, fix: null };
  var missing = imgs.filter(function(i) { return !i.alt || i.alt.trim() === ''; }).length;
  if (missing === 0) return { score: 15, status: 'pass', issue: null, fix: null };
  var pct = Math.round((1 - missing / imgs.length) * 100);
  if (missing === imgs.length) return { score: 0, status: 'fail', issue: 'All ' + imgs.length + ' images missing alt text', fix: 'Add descriptive alt text to every image' };
  return { score: Math.round(15 * (1 - missing / imgs.length)), status: 'warn', issue: missing + ' of ' + imgs.length + ' images missing alt text (' + pct + '% coverage)', fix: 'Add descriptive alt text to images without it' };
}

function scoreLinks(n) {
  if (n >= 3) return { score: 15, status: 'pass', issue: null, fix: null };
  if (n >= 1) return { score: 8, status: 'warn', issue: 'Only ' + n + ' internal link' + (n > 1 ? 's' : '') + ' (recommend 3+)', fix: 'Add more internal links to related pages' };
  return { score: 0, status: 'fail', issue: 'No internal links', fix: 'Add internal links to at least 3 related pages' };
}

function computePageScore(p) {
  var t = scoreTitle(p.title);
  var m = scoreMeta(p.meta);
  var h = scoreH1s(p.h1s);
  var a = scoreAltText(p.imgs);
  var l = scoreLinks(p.internalLinks);
  var total = t.score + m.score + h.score + a.score + l.score;
  return { total: total, title: t, meta: m, h1: h, alt: a, links: l };
}

function computeOverall() {
  var totalTraffic = pages.reduce(function(s, p) { return s + p.traffic; }, 0);
  if (totalTraffic === 0) return 0;
  var weighted = 0;
  pages.forEach(function(p) {
    var s = computePageScore(p);
    weighted += s.total * (p.traffic / totalTraffic);
  });
  return Math.round(weighted);
}

function scoreColor(s) {
  if (s >= 80) return 'var(--s2-positive)';
  if (s >= 50) return 'var(--s2-notice)';
  return 'var(--s2-negative)';
}

// ==================== RENDER ====================
function renderSummary() {
  var overall = computeOverall();
  var critCount = pages.filter(function(p) { return computePageScore(p).total < 50; }).length;
  var warnCount = pages.filter(function(p) { var s = computePageScore(p).total; return s >= 50 && s < 80; }).length;
  var passCount = pages.filter(function(p) { return computePageScore(p).total >= 80; }).length;
  document.getElementById('summaryBar').innerHTML =
    '<div class="summary-score-block">' +
      '<div>' +
        '<div class="summary-score-label">Overall Score</div>' +
        '<div><span class="summary-score-value" style="color:' + scoreColor(overall) + '">' + overall + '</span><span class="summary-score-max">/100</span></div>' +
      '</div>' +
      '<div class="summary-meter">' +
        '<div class="summary-meter-fill" style="width:' + overall + '%;background:' + scoreColor(overall) + '"></div>' +
      '</div>' +
    '</div>' +
    '<div class="summary-sep"></div>' +
    '<div class="summary-stat"><div class="summary-stat-value">' + pages.length + '</div><div class="summary-stat-label">Pages audited</div></div>' +
    '<div class="summary-sep"></div>' +
    '<div class="summary-stat"><div class="summary-stat-value" style="color:var(--s2-negative)">' + critCount + '</div><div class="summary-stat-label">Critical</div></div>' +
    '<div class="summary-stat"><div class="summary-stat-value" style="color:var(--s2-notice)">' + warnCount + '</div><div class="summary-stat-label">Warnings</div></div>' +
    '<div class="summary-stat"><div class="summary-stat-value" style="color:var(--s2-positive)">' + passCount + '</div><div class="summary-stat-label">Passing</div></div>';
}

var COLUMNS = [
  { key: 'path', label: 'Page' },
  { key: 'titleStatus', label: 'Title' },
  { key: 'metaStatus', label: 'Meta Desc' },
  { key: 'h1Status', label: 'H1s' },
  { key: 'altStatus', label: 'Alt Text' },
  { key: 'links', label: 'Links' },
  { key: 'score', label: 'Score' },
];

function statusOrder(s) { return s === 'fail' ? 0 : s === 'warn' ? 1 : 2; }

function sortPages() {
  var scored = pages.map(function(p, i) { return { p: p, i: i, sc: computePageScore(p) }; });
  scored.sort(function(a, b) {
    var va, vb;
    switch (sortCol) {
      case 'path': va = a.p.path; vb = b.p.path; return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      case 'titleStatus': va = statusOrder(a.sc.title.status); vb = statusOrder(b.sc.title.status); break;
      case 'metaStatus': va = statusOrder(a.sc.meta.status); vb = statusOrder(b.sc.meta.status); break;
      case 'h1Status': va = statusOrder(a.sc.h1.status); vb = statusOrder(b.sc.h1.status); break;
      case 'altStatus': va = statusOrder(a.sc.alt.status); vb = statusOrder(b.sc.alt.status); break;
      case 'links': va = a.p.internalLinks; vb = b.p.internalLinks; break;
      case 'score': va = a.sc.total; vb = b.sc.total; break;
      default: va = a.sc.total; vb = b.sc.total;
    }
    return sortDir === 'asc' ? va - vb : vb - va;
  });
  return scored;
}

function statusIcon(status) {
  if (status === 'pass') return '<span class="status-icon status-pass">&#10003;</span>';
  if (status === 'warn') return '<span class="status-icon status-warn">&#9888;</span>';
  return '<span class="status-icon status-fail">&#10007;</span>';
}

function renderTable() {
  var headHtml = '<tr>';
  COLUMNS.forEach(function(col) {
    var active = sortCol === col.key;
    var arrow = active ? (sortDir === 'asc' ? '\u25B2' : '\u25BC') : '\u25B2';
    headHtml += '<th class="' + (active ? 'sort-active' : '') + '" data-col="' + col.key + '">' + col.label + '<span class="sort-arrow">' + arrow + '</span></th>';
  });
  headHtml += '</tr>';
  document.getElementById('auditHead').innerHTML = headHtml;

  var sorted = sortPages();
  var bodyHtml = '';
  sorted.forEach(function(item) {
    var p = item.p, i = item.i, sc = item.sc;
    var sel = i === selectedIdx ? ' selected' : '';
    bodyHtml += '<tr class="' + sel + '" data-idx="' + i + '">' +
      '<td><strong>' + p.name + '</strong><br><span style="font-size:11px;color:var(--s2-gray-600)">' + p.path + '</span></td>' +
      '<td>' + statusIcon(sc.title.status) + '</td>' +
      '<td>' + statusIcon(sc.meta.status) + '</td>' +
      '<td>' + statusIcon(sc.h1.status) + '</td>' +
      '<td>' + statusIcon(sc.alt.status) + '</td>' +
      '<td style="font-variant-numeric:tabular-nums">' + p.internalLinks + '</td>' +
      '<td><div class="mini-meter"><span class="mini-meter-num" style="color:' + scoreColor(sc.total) + '">' + sc.total + '</span><div class="mini-meter-bar"><div class="mini-meter-fill" style="width:' + sc.total + '%;background:' + scoreColor(sc.total) + '"></div></div></div></td>' +
    '</tr>';
  });
  document.getElementById('auditBody').innerHTML = bodyHtml;

  document.querySelectorAll('#auditBody tr').forEach(function(tr) {
    tr.addEventListener('click', function() {
      selectedIdx = parseInt(tr.dataset.idx);
      renderTable();
      renderDetail();
    });
  });

  document.querySelectorAll('#auditHead th').forEach(function(th) {
    th.addEventListener('click', function() {
      var col = th.dataset.col;
      if (sortCol === col) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
      else { sortCol = col; sortDir = 'asc'; }
      renderTable();
    });
  });
}

function renderDetail() {
  var panel = document.getElementById('detailPanel');
  if (selectedIdx < 0 || selectedIdx >= pages.length) {
    panel.innerHTML = '<div class="no-selection">Click a row above to view page details and SERP preview</div>';
    return;
  }
  var p = pages[selectedIdx];
  var sc = computePageScore(p);

  var issues = [];
  var checks = [
    { score: sc.title.score, status: sc.title.status, issue: sc.title.issue, fix: sc.title.fix, category: 'Title' },
    { score: sc.meta.score, status: sc.meta.status, issue: sc.meta.issue, fix: sc.meta.fix, category: 'Meta Description' },
    { score: sc.h1.score, status: sc.h1.status, issue: sc.h1.issue, fix: sc.h1.fix, category: 'H1 Headings' },
    { score: sc.alt.score, status: sc.alt.status, issue: sc.alt.issue, fix: sc.alt.fix, category: 'Alt Text' },
    { score: sc.links.score, status: sc.links.status, issue: sc.links.issue, fix: sc.links.fix, category: 'Internal Links' },
  ];
  checks.forEach(function(c) {
    if (c.issue) {
      issues.push({ severity: c.status, text: c.issue, suggestion: c.fix, category: c.category });
    } else if (c.status === 'pass') {
      issues.push({ severity: 'pass', text: c.category + ': Looks good', suggestion: null, category: c.category });
    }
  });

  issues.sort(function(a, b) { return statusOrder(a.severity) - statusOrder(b.severity); });

  var titleLen = (p.title || '').length;
  var metaLen = (p.meta || '').length;
  var serpTitle = p.title || 'Untitled Page';
  var serpDesc = p.meta || 'No description provided for this page.';

  function charClass(len, min, max) {
    if (len >= min && len <= max) return 'char-good';
    if (len > 0) return 'char-warn';
    return 'char-bad';
  }

  var issuesHtml = issues.map(function(iss) {
    var cls = iss.severity === 'fail' ? 'critical' : iss.severity === 'warn' ? 'warning' : 'pass';
    var icon = iss.severity === 'fail' ? '&#10007;' : iss.severity === 'warn' ? '&#9888;' : '&#10003;';
    var iconCls = iss.severity === 'fail' ? 'status-fail' : iss.severity === 'warn' ? 'status-warn' : 'status-pass';
    var fixBtn = '';
    if (iss.suggestion && iss.severity !== 'pass') {
      var action = '';
      if (iss.category === 'Title') action = 'fix-meta';
      else if (iss.category === 'Meta Description') action = 'fix-meta';
      else if (iss.category === 'H1 Headings') action = 'fix-heading';
      else if (iss.category === 'Alt Text') action = 'fix-image-alt';
      else action = 'fix-meta';
      fixBtn = '<button class="btn-autofix" data-category="' + iss.category + '" data-action="' + action + '">Auto-fix</button>';
    }
    // Check for pending suggestions for this category
    var suggestionsHtml = getSuggestionsHtml(selectedIdx, iss.category);
    return '<div class="issue-item ' + cls + '">' +
      '<span class="issue-icon ' + iconCls + '">' + icon + '</span>' +
      '<div class="issue-content">' +
        '<div class="issue-text">' + escHtml(iss.text) + '</div>' +
        (iss.suggestion ? '<div class="issue-suggestion">' + escHtml(iss.suggestion) + '</div>' : '') +
        fixBtn +
        suggestionsHtml +
      '</div>' +
    '</div>';
  }).join('');

  panel.innerHTML =
    '<div class="detail-panel">' +
      '<div class="detail-header">' +
        '<div class="detail-page-path">' + p.name + ' <span style="font-weight:400;color:var(--s2-gray-600);font-size:13px">' + p.path + '</span></div>' +
        '<div class="detail-page-score" style="background:' + scoreColor(sc.total) + '20;color:' + scoreColor(sc.total) + '">' + sc.total + '/100</div>' +
      '</div>' +
      '<div class="detail-grid">' +
        '<div class="serp-card">' +
          '<div class="serp-label">SERP Preview</div>' +
          '<div class="serp-preview">' +
            '<div class="serp-title" id="serpTitle">' + escHtml(serpTitle) + '</div>' +
            '<div class="serp-url">https://www.astrazeneca.com' + p.path + '</div>' +
            '<div class="serp-desc" id="serpDesc">' + escHtml(serpDesc) + '</div>' +
          '</div>' +
          '<div class="serp-char-count">' +
            'Title: <span id="serpTitleCount" class="' + charClass(titleLen, 50, 60) + '">' + titleLen + ' chars</span>' +
            ' &middot; ' +
            'Description: <span id="serpMetaCount" class="' + charClass(metaLen, 120, 160) + '">' + metaLen + ' chars</span>' +
          '</div>' +
        '</div>' +
        '<div class="issues-card">' +
          '<div class="serp-label">Issues & Checks</div>' +
          '<div class="issues-list">' + issuesHtml + '</div>' +
        '</div>' +
        '<div class="edit-fields">' +
          '<div class="edit-field">' +
            '<label>Page Title</label>' +
            '<input type="text" id="editTitle" value="' + escAttr(p.title) + '" placeholder="Enter page title (50\u201360 chars ideal)">' +
            '<div class="char-indicator"><span id="titleCharCount" class="' + charClass(titleLen, 50, 60) + '">' + titleLen + '/60 characters</span></div>' +
          '</div>' +
          '<div class="edit-field">' +
            '<label>Meta Description</label>' +
            '<textarea id="editMeta" rows="3" placeholder="Enter meta description (120\u2013160 chars ideal)">' + escHtml(p.meta) + '</textarea>' +
            '<div class="char-indicator"><span id="metaCharCount" class="' + charClass(metaLen, 120, 160) + '">' + metaLen + '/160 characters</span></div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  // Wire up live editing
  var titleInput = document.getElementById('editTitle');
  var metaInput = document.getElementById('editMeta');

  titleInput.addEventListener('input', function() {
    pages[selectedIdx].title = titleInput.value;
    refresh();
  });
  metaInput.addEventListener('input', function() {
    pages[selectedIdx].meta = metaInput.value;
    refresh();
  });

  // Wire up auto-fix buttons -> slicc.lick
  document.querySelectorAll('.btn-autofix').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var action = btn.dataset.action;
      var category = btn.dataset.category;
      slicc.lick({
        action: action,
        data: { pageIndex: selectedIdx, path: pages[selectedIdx].path, category: category }
      });
    });
  });

  // Wire up suggestion pick buttons
  document.querySelectorAll('.pick-btn[data-skey]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      applySuggestion(btn.dataset.skey, parseInt(btn.dataset.sidx));
    });
  });
}

function applyAutoFix(category) {
  if (selectedIdx < 0) return;
  var p = pages[selectedIdx];

  switch (category) {
    case 'Title': {
      var len = (p.title || '').length;
      if (!p.title || p.title.trim() === '') {
        p.title = p.name + ' \u2014 TAVEX (tavexirel) | AstraZeneca';
      } else if (len > 60) {
        var shortened = p.name ? p.name + ' \u2014 TAVEX | AstraZeneca' : p.title.substring(0, 57) + '...';
        if (shortened.length > 60) shortened = shortened.substring(0, 57) + '...';
        p.title = shortened;
      } else if (len < 50) {
        p.title = p.title + ' \u2014 TAVEX (tavexirel) | AstraZeneca';
        if (p.title.length > 60) p.title = p.title.substring(0, 60);
      }
      break;
    }
    case 'Meta Description': {
      if (!p.meta || p.meta.trim() === '') {
        var suggestions = {
          '/tavex/': 'Discover TAVEX (tavexirel), a selective JAK1 inhibitor for the treatment of moderate-to-severe rheumatoid arthritis in adults.',
          '/tavex/efficacy': 'Review clinical efficacy data from RESOLVE-1 and RESOLVE-2 trials for TAVEX in rheumatoid arthritis treatment.',
          '/tavex/safety': 'Explore the safety profile of TAVEX including adverse event data and monitoring recommendations for healthcare professionals.',
          '/tavex/dosing': 'Complete dosing information for TAVEX 200mg tablets including administration, dose adjustments, and special populations.',
          '/tavex/mechanism-of-action': 'Learn how TAVEX selectively inhibits JAK1 to reduce inflammation in rheumatoid arthritis through targeted cytokine modulation.',
          '/tavex/prescribing-information': 'Access full prescribing information for TAVEX including indications, dosage, contraindications, and adverse event data.',
        };
        p.meta = suggestions[p.path] || 'Learn about ' + p.name + ' for TAVEX (tavexirel), a treatment for rheumatoid arthritis. View clinical data and prescribing details.';
      } else if (p.meta.length < 120) {
        var pad = ' View complete clinical data and prescribing information for healthcare professionals.';
        p.meta = p.meta.replace(/\.$/, '') + '.' + pad;
        if (p.meta.length > 160) p.meta = p.meta.substring(0, 157) + '...';
      } else if (p.meta.length > 160) {
        p.meta = p.meta.substring(0, 157) + '...';
      }
      break;
    }
    case 'H1 Headings': {
      if (p.h1s.length === 0) {
        p.h1s = [p.name];
      } else if (p.h1s.length > 1) {
        p.h1s = [p.h1s[0]];
      }
      break;
    }
    case 'Alt Text': {
      p.imgs.forEach(function(img, i) {
        if (!img.alt || img.alt.trim() === '') {
          img.alt = p.name + ' image ' + (i + 1);
        }
      });
      break;
    }
    case 'Internal Links': {
      p.internalLinks = Math.max(p.internalLinks, 3);
      break;
    }
  }

  refresh();
}

function refresh() {
  renderSummary();
  renderTable();
  renderDetail();
  saveState();
}

function showToast(msg, isError) {
  var toast = document.createElement('div');
  toast.className = 'toast ' + (isError ? 'error' : 'success');
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function escAttr(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ==================== STATE PERSISTENCE ====================
function saveState() {
  slicc.setState({
    pages: pages,
    selectedIdx: selectedIdx,
    sortCol: sortCol,
    sortDir: sortDir
  });
}

function restoreState(state) {
  if (state && state.pages) {
    pages = state.pages;
    selectedIdx = typeof state.selectedIdx === 'number' ? state.selectedIdx : -1;
    sortCol = state.sortCol || 'score';
    sortDir = state.sortDir || 'asc';
    refresh();
    return true;
  }
  return false;
}

// ==================== PRESETS ====================
function loadPreset(key) {
  selectedIdx = -1;
  if (key === 'critical') {
    pages = JSON.parse(JSON.stringify(PRESETS.current));
    pages = pages.filter(function(p) { return computePageScore(p).total < 50; });
    if (pages.length === 0) {
      pages = JSON.parse(JSON.stringify(PRESETS.current));
      pages = pages.filter(function(p) {
        var sc = computePageScore(p);
        return sc.title.status === 'fail' || sc.meta.status === 'fail' || sc.h1.status === 'fail' || sc.alt.status === 'fail' || sc.links.status === 'fail';
      });
    }
  } else {
    pages = JSON.parse(JSON.stringify(PRESETS[key]));
  }
  refresh();
}

// ==================== SUGGESTIONS ====================
var pendingSuggestions = {}; // keyed by "pageIndex:category"

function renderSuggestions(pageIndex, category, suggestions) {
  var key = pageIndex + ':' + category;
  pendingSuggestions[key] = { pageIndex: pageIndex, category: category, suggestions: suggestions };
  // Re-render detail if viewing this page
  if (selectedIdx === pageIndex) {
    renderDetail();
  }
}

function getSuggestionsHtml(pageIndex, category) {
  var key = pageIndex + ':' + category;
  var entry = pendingSuggestions[key];
  if (!entry || !entry.suggestions || entry.suggestions.length === 0) return '';

  var html = '<div class="suggestions-panel" data-suggestion-key="' + escAttr(key) + '">' +
    '<div class="suggestions-label">Suggested fixes (' + entry.suggestions.length + ')</div>';
  entry.suggestions.forEach(function(s, i) {
    html += '<div class="suggestion-option">' +
      '<span class="suggestion-text">' + escHtml(s) + '</span>' +
      '<button class="pick-btn" data-skey="' + escAttr(key) + '" data-sidx="' + i + '">Apply</button>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

function applySuggestion(key, idx) {
  var entry = pendingSuggestions[key];
  if (!entry) return;
  var p = pages[entry.pageIndex];
  if (!p) return;
  var value = entry.suggestions[idx];

  if (entry.category === 'Title') {
    p.title = value;
  } else if (entry.category === 'Meta Description') {
    p.meta = value;
  }

  delete pendingSuggestions[key];
  selectedIdx = entry.pageIndex;
  refresh();

  // Notify scoop of the choice
  slicc.lick({
    action: 'suggestion-applied',
    data: { pageIndex: entry.pageIndex, category: entry.category, chosen: value }
  });
}

// ==================== BRIDGE ====================
slicc.on('update', function(data) {
  if (data && data.action === 'apply-fix') {
    // Cone/scoop can push fixes via sprinkle send
    if (typeof data.pageIndex === 'number' && data.category) {
      selectedIdx = data.pageIndex;
      applyAutoFix(data.category);
    }
  }
  if (data && data.action === 'fix-suggestions') {
    // Scoop pushes suggested fixes for user to pick from
    if (typeof data.pageIndex === 'number' && data.category && Array.isArray(data.suggestions)) {
      renderSuggestions(data.pageIndex, data.category, data.suggestions);
    }
  }
  if (data && data.action === 'da-applied') {
    // DA write confirmed — show a brief toast notification
    showToast('Applied to DA: ' + (data.path || 'page') + (data.previewUrl ? ' — preview ready' : ''));
  }
  if (data && data.action === 'da-error') {
    showToast('DA error: ' + (data.message || 'could not apply'), true);
  }
  if (data && data.pages) {
    pages = data.pages;
    selectedIdx = typeof data.selectedIdx === 'number' ? data.selectedIdx : selectedIdx;
    refresh();
  }
});

// ==================== INIT ====================
function init() {
  var saved = slicc.getState();
  if (!restoreState(saved)) {
    loadPreset('current');
  }

  // Preset buttons
  document.querySelectorAll('.preset').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.preset').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      loadPreset(btn.dataset.preset);
    });
  });
}

init();
</script>
</body>
</html>
