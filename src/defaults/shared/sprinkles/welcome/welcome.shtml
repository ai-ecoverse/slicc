<!DOCTYPE html>
<html lang="en">
<head>
<title>Welcome</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Adobe Clean', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--s2-bg-base);
    color: var(--s2-content-default);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Gradient banner (exact Figma: -1deg, 0.40 opacity, white overlay) ── */
  .banner {
    position: relative;
    padding: 48px 24px 40px;
    text-align: center;
    overflow: hidden;
    border-radius: 16px 16px 0 0;
  }
  .banner-bg {
    position: absolute; inset: 0;
    background: linear-gradient(-1.17deg, #ffcaec 16.77%, #bf8bf4 92.01%, #602dff 131.89%);
    opacity: 0.40;
  }
  .banner-fade {
    position: absolute; inset: 0;
    background:
      linear-gradient(56.42deg, rgba(255,255,255,0) 49.79%, rgba(255,255,255,0.85) 96.09%),
      linear-gradient(to bottom, rgba(255,255,255,0) 40%, rgba(255,255,255,1) 100%);
  }
  .banner-content { position: relative; z-index: 1; }
  .banner-title {
    font-size: 32px;
    font-weight: 900;
    line-height: 38px;
    color: var(--s2-content-default);
    letter-spacing: -0.01em;
  }
  .banner-sub {
    font-size: 14px;
    color: var(--s2-content-secondary);
    margin-top: 4px;
    line-height: 18px;
  }

  /* ── Content area ── */
  .content { padding: 0 24px 48px; }

  /* ── Step visibility ── */
  .step { display: none; animation: fadeUp 0.4s ease both; }
  .step.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Prompt bar (Figma: 140px card, gradient glow, 2px purple border) ── */
  .prompt-bar {
    position: relative;
    margin: -24px auto 0;
    max-width: 520px;
    z-index: 2;
  }
  .prompt-bar--inline { margin-top: 20px; }
  .prompt-bar-glow {
    position: absolute; inset: 0;
    border-radius: 28px;
    background: linear-gradient(142deg, #9a3cf9 4%, #e743c8 35%, #ed457e 69%, #ff7918 105%);
    opacity: 0.20;
    filter: blur(20px);
    box-shadow: 0px 4px 24px 0px #340349;
  }
  .prompt-bar-border {
    position: absolute; inset: 0;
    border-radius: 16px;
    padding: 2px;
    background: linear-gradient(142deg, #9a3cf9 4%, #e743c8 35%, #ed457e 69%, #ff7918 105%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    pointer-events: none;
    z-index: 1;
  }
  .prompt-bar-inner {
    position: relative;
    background: var(--s2-bg-elevated, #fff);
    border: none;
    border-radius: 16px;
    box-shadow: 0px 1px 6px 0px rgba(0,0,0,0.12);
    padding: 16px;
    height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .prompt-bar-inner input,
  .prompt-bar-inner textarea {
    width: 100%;
    border: none; outline: none;
    font-family: inherit;
    font-size: 14px; line-height: 18px;
    color: var(--s2-content-default, #131313);
    background: transparent;
    resize: none;
    flex: 1;
  }
  .prompt-bar-inner input::placeholder,
  .prompt-bar-inner textarea::placeholder { color: var(--s2-gray-600); }

  .prompt-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .plus-btn {
    width: 32px; height: 32px;
    border: none; background: none;
    cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--s2-gray-600);
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .plus-btn:hover { background: var(--s2-gray-100); color: var(--s2-gray-800); }
  .plus-btn svg { width: 20px; height: 20px; }
  .send-btn {
    width: 32px; height: 32px;
    border-radius: 50%; border: none;
    background: #3B63FB;
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover { background: #2b4ed4; transform: scale(1.06); }
  .send-btn:disabled { background: var(--s2-gray-300); cursor: default; transform: none; }
  .send-btn svg { width: 18px; height: 18px; }

  /* ── Quick starts table (Figma "My work" widget style) ── */
  .qs-widget {
    background: var(--s2-bg-elevated, #fff);
    border: 1px solid #dadada;
    border-radius: 16px;
    padding: 0 24px;
    max-width: 520px;
    margin: 24px auto 0;
  }
  .qs-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 16px 0 12px;
  }
  .qs-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--s2-content-default, #292929);
  }
  .qs-viewall {
    font-size: 14px;
    font-weight: 500;
    color: var(--s2-content-default, #292929);
    background: none; border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .qs-viewall:hover { text-decoration: underline; }
  .qs-row {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 56px;
    border-top: 1px solid #e9e9e9;
    cursor: pointer;
    transition: background 0.12s;
  }
  .qs-row:hover { background: #fafafa; margin: 0 -24px; padding: 0 24px; }
  .qs-badge {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 8px;
    border-radius: 11px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 72px;
    justify-content: center;
  }
  .qs-task {
    flex: 1;
    font-size: 14px;
    font-weight: 700;
    color: var(--s2-content-default, #292929);
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .qs-desc {
    font-size: 12px;
    color: #505050;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }
  .qs-arrow {
    color: #dadada;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 11px; font-weight: 700;
    color: var(--s2-gray-600); text-transform: uppercase;
    letter-spacing: 0.06em; text-align: center;
    margin: 28px 0 16px;
  }

  /* ── Skills grid ── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    max-width: 520px;
    margin: 0 auto;
  }
  .skill-card {
    display: flex; align-items: center;
    gap: 10px; padding: 12px;
    border-radius: 12px; background: var(--s2-bg-elevated);
    box-shadow: 0 0 1px 0 rgba(0,0,0,0.08), 0 1px 4px 0 rgba(0,0,0,0.04), 0 2px 8px 0 rgba(0,0,0,0.08);
    border: 1px solid var(--s2-gray-200);
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .skill-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
  .skill-card.on { border-color: #9a3cf9; background: color-mix(in srgb, #9a3cf9 6%, var(--s2-bg-elevated)); }
  .skill-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--s2-gray-25); font-size: 13px; font-weight: 800; flex-shrink: 0;
  }
  .skill-name { font-size: 13px; font-weight: 600; flex: 1; }
  .skill-chk {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--s2-gray-300); flex-shrink: 0;
    transition: all 0.15s;
  }
  .skill-card.on .skill-chk {
    border-color: #9a3cf9; background: #9a3cf9;
    box-shadow: inset 0 0 0 3px var(--s2-bg-elevated);
  }

  /* ── Widget cards ── */
  .widget {
    background: var(--s2-bg-elevated); border-radius: 16px;
    box-shadow: 0 0 1px 0 rgba(0,0,0,0.08), 0 1px 4px 0 rgba(0,0,0,0.04), 0 2px 8px 0 rgba(0,0,0,0.08);
    padding: 24px; max-width: 520px; margin: 0 auto;
  }
  .widget-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .widget-sub { font-size: 13px; color: var(--s2-content-secondary); margin-bottom: 20px; }

  /* ── Install list ── */
  .install-item {
    display: flex; align-items: center;
    gap: 12px; padding: 10px 0;
    font-size: 14px; font-weight: 600; color: var(--s2-gray-400);
    border-bottom: 1px solid var(--s2-gray-100);
    transition: color 0.3s;
  }
  .install-item:last-child { border-bottom: none; }
  .install-item.done { color: var(--s2-content-default); }
  .install-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--s2-gray-200);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.3s;
  }
  .install-item.done .install-dot { background: var(--s2-positive); }
  .install-dot svg { width: 12px; height: 12px; opacity: 0; transition: opacity 0.3s; }
  .install-item.done .install-dot svg { opacity: 1; }

  /* ── Suggestion rows ── */
  .suggestions { display: flex; flex-direction: column; gap: 8px; max-width: 520px; margin: 0 auto; }
  .sug-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: 12px;
    background: var(--s2-bg-elevated); box-shadow: 0 0 1px 0 rgba(0,0,0,0.08), 0 1px 4px 0 rgba(0,0,0,0.04), 0 2px 8px 0 rgba(0,0,0,0.08);
    border: none; font-family: inherit; font-size: 14px; font-weight: 600;
    color: var(--s2-content-default); cursor: pointer; text-align: left; width: 100%;
    transition: box-shadow 0.2s, transform 0.12s;
  }
  .sug-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.16); transform: translateY(-1px); }
  .sug-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--s2-gray-25); font-size: 16px; flex-shrink: 0;
  }
  .sug-text { flex: 1; }
  .sug-label { font-weight: 700; }
  .sug-desc { font-size: 12px; color: var(--s2-content-secondary); font-weight: 400; margin-top: 2px; }
  .sug-arrow { color: var(--s2-gray-400); font-size: 20px; flex-shrink: 0; }

  /* ── CTA button ── */
  .cta {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 28px; border-radius: 9999px;
    background: var(--s2-accent); color: var(--s2-gray-25); border: none;
    font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
  }
  .cta:hover { background: var(--s2-accent-hover, #2b4ed4); }

  /* ── Avatar ── */
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #9a3cf9, #e743c8);
    display: flex; align-items: center; justify-content: center;
    color: var(--s2-gray-25); font-size: 22px; font-weight: 800;
    margin: 0 auto 12px;
  }

  .center { text-align: center; }
  .muted { font-size: 13px; color: var(--s2-content-secondary); }
  .mt-24 { margin-top: 24px; }
  .mt-16 { margin-top: 16px; }
</style>
</head>
<body>

  <!-- Banner -->
  <div class="banner" id="banner">
    <div class="banner-bg"></div>
    <div class="banner-fade"></div>
    <div class="banner-content">
      <div class="banner-title" id="bTitle">Welcome to SLICC</div>
      <div class="banner-sub" id="bSub">Your browser-native AI coding agent</div>
    </div>
  </div>

  <div class="content">

    <!-- Step 0: Name -->
    <div class="step active" id="s0">
      <div class="prompt-bar">
        <div class="prompt-bar-glow"></div>
        <div class="prompt-bar-border"></div>
        <div class="prompt-bar-inner">
          <input type="text" id="nameIn" placeholder="What's your name?" autofocus
            onkeydown="if(event.key==='Enter'&&this.value.trim())go(1)">
          <div class="prompt-actions">
            <button class="plus-btn" title="Attach">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M16.25 9.25H10.75V3.75C10.75 3.336 10.414 3 10 3C9.586 3 9.25 3.336 9.25 3.75V9.25H3.75C3.336 9.25 3 9.586 3 10C3 10.414 3.336 10.75 3.75 10.75H9.25V16.25C9.25 16.664 9.586 17 10 17C10.414 17 10.75 16.664 10.75 16.25V10.75H16.25C16.664 10.75 17 10.414 17 10C17 9.586 16.664 9.25 16.25 9.25Z"/></svg>
            </button>
            <button class="send-btn" id="nameBtn" disabled onclick="go(1)">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3.1 17.4a.75.75 0 01-.96-1.05L5.68 10 2.14 3.65a.75.75 0 01.96-1.05l14.5 6.75a.75.75 0 010 1.3l-14.5 6.75z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Step 1: Welcome + Quick Actions -->
    <div class="step" id="s1">
      <div class="prompt-bar prompt-bar--inline">
        <div class="prompt-bar-glow"></div>
        <div class="prompt-bar-border"></div>
        <div class="prompt-bar-inner">
          <textarea id="taskIn" rows="2" placeholder="What do you want to work on?"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey&&this.value.trim()){event.preventDefault();go(3)}"></textarea>
          <div class="prompt-actions">
            <button class="plus-btn" title="Attach">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M16.25 9.25H10.75V3.75C10.75 3.336 10.414 3 10 3C9.586 3 9.25 3.336 9.25 3.75V9.25H3.75C3.336 9.25 3 9.586 3 10C3 10.414 3.336 10.75 3.75 10.75H9.25V16.25C9.25 16.664 9.586 17 10 17C10.414 17 10.75 16.664 10.75 16.25V10.75H16.25C16.664 10.75 17 10.414 17 10C17 9.586 16.664 9.25 16.25 9.25Z"/></svg>
            </button>
            <button class="send-btn" onclick="go(3)">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3.1 17.4a.75.75 0 01-.96-1.05L5.68 10 2.14 3.65a.75.75 0 01.96-1.05l14.5 6.75a.75.75 0 010 1.3l-14.5 6.75z"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="qs-widget" id="qsTable"></div>
    </div>

    <!-- Step 3: Installing -->
    <div class="step" id="s3">
      <div style="padding-top:12px">
        <div class="avatar" id="av">?</div>
        <div class="center">
          <div class="widget-title" id="niceT">Nice to meet you!</div>
          <div class="muted" id="installLabel">Setting up your workspace&hellip;</div>
        </div>
        <div class="widget mt-16" id="installCard">
          <div id="installList"></div>
        </div>
      </div>
    </div>

    <!-- Step 4: First task -->
    <div class="step" id="s4">
      <div class="section-label">What do you want to work on first?</div>
      <div class="suggestions" id="sugs"></div>
      <div class="center mt-24 muted">Or just type a message in the chat to get started.</div>
    </div>

  </div>

<script>
  var cur = 0, uname = '', picks = [];


  var QUICK_STARTS = [
    { badge:'Research',  bg:'#ACCFFD', color:'#292929', task:'Research a topic',         desc:'Scrape sites, synthesize findings' },
    { badge:'Automate',  bg:'#FFC15E', color:'#292929', task:'Automate a workflow',      desc:'Browser macros, cron tasks, webhooks' },
    { badge:'Extract',   bg:'#F7B5FF', color:'#292929', task:'Extract structured data',  desc:'Tables, PDFs, screenshots to JSON' },
    { badge:'Analyze',   bg:'#BFDFBF', color:'#292929', task:'Audit a website',          desc:'SEO, a11y, performance, content' },
    { badge:'Build',     bg:'#ACCFFD', color:'#292929', task:'Build an app',             desc:'Scaffold a site or dashboard' },
    { badge:'Monitor',   bg:'#FFDE2C', color:'#292929', task:'Monitor a page',           desc:'Watch for changes, track metrics' },
  ];

  var SKILLS = [
    { id:'web',    name:'Web Development',  ic:'&lt;/&gt;', bg:'#3b63fb' },
    { id:'data',   name:'Data Analysis',    ic:'&#x2261;',  bg:'#52a119' },
    { id:'content',name:'Content Writing',  ic:'&#x270E;',  bg:'#a65ce7' },
    { id:'auto',   name:'Automation',       ic:'&#x26A1;',  bg:'#ff7918' },
    { id:'design', name:'UI Design',        ic:'&#x25CB;',  bg:'#e743c8' },
    { id:'seo',    name:'SEO',              ic:'&#x2191;',  bg:'#d92361' },
    { id:'devops', name:'DevOps',           ic:'&#x2699;',  bg:'#6338ee' },
    { id:'api',    name:'API Integration',  ic:'&#x21C4;',  bg:'#0097a7' },
  ];

  var SUGS = [
    { l:'Build an app',          d:'Scaffold a site or web app from scratch',  bg:'#3b63fb' },
    { l:'Analyze a website',     d:'Run an SEO, performance, or a11y audit',   bg:'#52a119' },
    { l:'Automate a workflow',   d:'Write a script or set up a cron task',     bg:'#ff7918' },
    { l:'Research a topic',      d:'Scrape sites and summarize findings',      bg:'#a65ce7' },
  ];

  /* ── Build quick starts table ── */
  var qt = document.getElementById('qsTable');
  var qh = document.createElement('div');
  qh.className = 'qs-header';
  qh.innerHTML = '<span class="qs-title">Quick starts</span>';
  qt.appendChild(qh);

  QUICK_STARTS.forEach(function(q) {
    var row = document.createElement('div');
    row.className = 'qs-row';
    row.innerHTML = '<span class="qs-badge" style="background:'+q.bg+';color:'+q.color+'">'+q.badge+'</span>'
      + '<span class="qs-task">'+q.task+'</span>'
      + '<span class="qs-desc">'+q.desc+'</span>'
      + '<span class="qs-arrow">\u203A</span>';
    row.onclick = function() {
      document.getElementById('taskIn').value = q.task;
      document.getElementById('taskIn').focus();
    };
    qt.appendChild(row);
  });

  /* ── Name input ── */
  var ni = document.getElementById('nameIn'), nb = document.getElementById('nameBtn');
  ni.oninput = function() { nb.disabled = !ni.value.trim(); };

  function go(n) {
    if (n === 1) {
      uname = ni.value.trim();
      if (!uname) return;
      document.getElementById('bTitle').textContent = 'Welcome, ' + uname;
      document.getElementById('bSub').textContent = '';
    }
    if (n === 3) {
      var task = document.getElementById('taskIn')
        ? document.getElementById('taskIn').value.trim() : '';
      document.getElementById('bTitle').textContent = '';
      document.getElementById('bSub').textContent = '';
      document.getElementById('banner').style.padding = '20px 24px';
      document.getElementById('niceT').textContent = 'Nice to meet you, ' + uname + '!';
      document.getElementById('av').textContent = uname.charAt(0).toUpperCase();
      runInstall();
    }
    document.getElementById('s'+cur).classList.remove('active');
    document.getElementById('s'+n).classList.add('active');
    cur = n;
  }

  function runInstall() {
    var items = [
      {t:'Initializing workspace'},
      {t:'Loading core tools'},
      {t:'Installing Web Development'},
      {t:'Installing Content Writing'},
      {t:'Installing Automation'},
      {t:'Ready to go'},
    ];

    var el = document.getElementById('installList');
    el.innerHTML = '';
    items.forEach(function(it) {
      var d = document.createElement('div');
      d.className = 'install-item';
      d.innerHTML = '<div class="install-dot"><svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polyline points="2.5,6 5,8.5 9.5,3.5"/></svg></div><span>'+it.t+'</span>';
      el.appendChild(d);
    });

    var all = el.querySelectorAll('.install-item'), i = 0;
    function tick() {
      if (i >= all.length) { setTimeout(function(){ go(4); showSugs(); }, 500); return; }
      all[i].classList.add('done');
      i++;
      setTimeout(tick, 350 + Math.random()*250);
    }
    setTimeout(tick, 400);
  }

  function showSugs() {
    document.getElementById('bTitle').textContent = 'You\u2019re all set, ' + uname;
    document.getElementById('bSub').textContent = 'Your workspace is ready';
    document.getElementById('banner').style.padding = '36px 24px 32px';

    var el = document.getElementById('sugs');
    el.innerHTML = '';
    SUGS.forEach(function(s) {
      var b = document.createElement('button');
      b.className = 'sug-btn';
      b.innerHTML = '<div class="sug-icon" style="background:'+s.bg+'">'
        + '<svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M14.5 14.5c-.19 0-.38-.07-.53-.22-.29-.29-.29-.77 0-1.06l3.22-3.22-3.22-3.22a.75.75 0 011.06-1.06l3.75 3.75c.29.29.29.77 0 1.06l-3.75 3.75c-.15.15-.34.22-.53.22z"/></svg>'
        + '</div><div class="sug-text"><div class="sug-label">'+s.l+'</div><div class="sug-desc">'+s.d+'</div></div>'
        + '<div class="sug-arrow">\u203A</div>';
      b.onclick = function(){ if(window.slicc) slicc.lick({action:'start-task',task:s.l}); };
      el.appendChild(b);
    });
  }
</script>
</body>
</html>
