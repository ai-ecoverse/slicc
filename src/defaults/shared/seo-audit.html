<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Audit</title>
<script src="backbone.js"></script>
</head>
<body>
<script>BB.injectHeader('SEO Audit');</script>
<style>
  .audit-container { max-width: 960px; margin: 0 auto; padding: var(--s2-spacing-400); }
  .audit-controls { display: flex; gap: 8px; margin-bottom: var(--s2-spacing-400); }
  .audit-controls input { flex: 1; }
  .score-bar { display: flex; gap: 16px; margin-bottom: var(--s2-spacing-400); }
  .score-card { flex: 1; padding: 16px; border-radius: var(--s2-radius-m); text-align: center; }
  .score-card .value { font-size: 28px; font-weight: 700; }
  .score-card .label { font-size: 11px; color: var(--s2-gray-500); margin-top: 4px; }
  .score-good { background: #E0F5EC; }
  .score-good .value { color: var(--s2-green-600); }
  .score-warn { background: #FFF3E0; }
  .score-warn .value { color: #B86E00; }
  .score-bad { background: #FFE5E6; }
  .score-bad .value { color: var(--s2-red-600); }
  .issue-list { display: grid; gap: 8px; }
  .issue-item { padding: 12px 16px; background: white; border: 1px solid var(--s2-gray-100); border-radius: var(--s2-radius-m); }
  .issue-item .path { font-size: 12px; color: var(--s2-blue-600); font-family: var(--s2-font-mono); }
  .issue-item .desc { font-size: 13px; margin-top: 4px; }
  .issue-item .severity { font-size: 11px; font-weight: 600; }
  .sev-error { color: var(--s2-red-600); }
  .sev-warning { color: #B86E00; }
  .sev-info { color: var(--s2-blue-600); }
  .section-title { font-size: 14px; font-weight: 600; margin: 24px 0 12px; color: var(--s2-gray-700); }
  .loading { text-align: center; padding: 40px; color: var(--s2-gray-400); }
  #results { display: none; }
</style>

<div class="audit-container">
  <div class="audit-controls">
    <input class="s2-input" id="auditPath" placeholder="Site path to audit (e.g. /tavex)" value="">
    <button class="s2-btn s2-btn-primary" id="runAudit">Run SEO Audit</button>
  </div>
  <div id="loading" class="loading" style="display:none;">Scanning pages...</div>
  <div id="results">
    <div class="score-bar" id="scores"></div>
    <div class="section-title">Issues</div>
    <div class="issue-list" id="issues"></div>
  </div>
</div>

<script>
(function() {
  var STORAGE_KEY = 'slicc-eds-config';
  var config = null;
  try { config = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {}
  if (config) BB.init(config);

  document.getElementById('auditPath').value = BB.site.sitePath || '';

  document.getElementById('runAudit').onclick = function() {
    runAudit();
  };

  function runAudit() {
    var path = document.getElementById('auditPath').value.trim();
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';

    BB.getQueryIndex().then(function(pages) {
      // Filter to site path
      var filtered = pages;
      if (path) {
        filtered = pages.filter(function(p) { return p.path && p.path.startsWith(path); });
      }
      if (filtered.length === 0) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('scores').innerHTML = '';
        document.getElementById('issues').innerHTML = '<div class="loading">No pages found in the query index for this path.</div>';
        return;
      }
      return analyzePages(filtered);
    }).catch(function(err) {
      document.getElementById('loading').style.display = 'none';
      alert('Error: ' + err.message);
    });
  }

  function analyzePages(pages) {
    var issues = [];
    var stats = { total: pages.length, titlesOk: 0, descriptionsOk: 0, imagesChecked: 0 };

    pages.forEach(function(page) {
      var path = page.path || '';
      var title = page.title || '';
      var description = page.description || '';

      // Title checks
      if (!title) {
        issues.push({ path: path, desc: 'Missing page title', severity: 'error', category: 'title' });
      } else {
        if (title.length < 30) {
          issues.push({ path: path, desc: 'Title too short (' + title.length + ' chars, recommend 30-60)', severity: 'warning', category: 'title' });
        } else if (title.length > 60) {
          issues.push({ path: path, desc: 'Title too long (' + title.length + ' chars, recommend 30-60)', severity: 'warning', category: 'title' });
        } else {
          stats.titlesOk++;
        }
      }

      // Description checks
      if (!description) {
        issues.push({ path: path, desc: 'Missing meta description', severity: 'error', category: 'description' });
      } else {
        if (description.length < 70) {
          issues.push({ path: path, desc: 'Description too short (' + description.length + ' chars, recommend 70-155)', severity: 'warning', category: 'description' });
        } else if (description.length > 155) {
          issues.push({ path: path, desc: 'Description too long (' + description.length + ' chars, recommend 70-155)', severity: 'warning', category: 'description' });
        } else {
          stats.descriptionsOk++;
        }
      }

      // Image check (from query index if available)
      if (page.image) {
        stats.imagesChecked++;
      } else {
        issues.push({ path: path, desc: 'No featured image set', severity: 'info', category: 'image' });
      }
    });

    displayResults(stats, issues);
  }

  function displayResults(stats, issues) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    var titlePct = stats.total > 0 ? Math.round(stats.titlesOk / stats.total * 100) : 0;
    var descPct = stats.total > 0 ? Math.round(stats.descriptionsOk / stats.total * 100) : 0;
    var errors = issues.filter(function(i) { return i.severity === 'error'; }).length;

    function scoreClass(pct) { return pct >= 80 ? 'score-good' : pct >= 50 ? 'score-warn' : 'score-bad'; }

    document.getElementById('scores').innerHTML =
      '<div class="score-card ' + scoreClass(titlePct) + '"><div class="value">' + titlePct + '%</div><div class="label">Titles OK</div></div>' +
      '<div class="score-card ' + scoreClass(descPct) + '"><div class="value">' + descPct + '%</div><div class="label">Descriptions OK</div></div>' +
      '<div class="score-card ' + (errors === 0 ? 'score-good' : 'score-bad') + '"><div class="value">' + errors + '</div><div class="label">Errors</div></div>' +
      '<div class="score-card score-good"><div class="value">' + stats.total + '</div><div class="label">Pages Scanned</div></div>';

    var html = '';
    issues.forEach(function(i) {
      html += '<div class="issue-item">' +
        '<div class="path">' + BB.escapeHtml(i.path) + '</div>' +
        '<div class="desc">' + BB.escapeHtml(i.desc) + ' <span class="severity sev-' + i.severity + '">' + i.severity.toUpperCase() + '</span></div>' +
      '</div>';
    });
    document.getElementById('issues').innerHTML = html || '<div class="loading">No issues found!</div>';

    // Save state for bridge
    if (typeof slicc !== 'undefined') {
      slicc.setState({ auditPath: document.getElementById('auditPath').value, issues: issues, stats: stats });
    }
  }

  // Bridge integration
  if (typeof slicc !== 'undefined') {
    slicc.on('update', function(data) {
      if (data && data.action === 'run-audit' && data.path) {
        document.getElementById('auditPath').value = data.path;
        runAudit();
      }
    });
  }

  // Auto-run from URL params
  var params = new URLSearchParams(window.location.search);
  if (params.get('path')) {
    document.getElementById('auditPath').value = params.get('path');
    runAudit();
  }
})();
</script>
</body>
</html>
