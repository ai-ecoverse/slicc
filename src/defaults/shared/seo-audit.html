<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Audit</title>
<script src="backbone.js"></script>
</head>
<body>
<script>BB.injectHeader('SEO Audit');</script>
<style>
  .audit-container { max-width: 960px; margin: 0 auto; padding: var(--s2-spacing-400); }
  .audit-controls { display: flex; gap: 8px; margin-bottom: var(--s2-spacing-400); }
  .audit-controls input { flex: 1; }

  /* Score cards */
  .score-bar { display: flex; gap: 16px; margin-bottom: var(--s2-spacing-400); }
  .score-card { flex: 1; padding: 16px; border-radius: var(--s2-radius-m); text-align: center; }
  .score-card .value { font-size: 28px; font-weight: 700; }
  .score-card .label { font-size: 11px; color: var(--s2-gray-500); margin-top: 4px; }
  .score-good { background: #E0F5EC; } .score-good .value { color: var(--s2-green-600); }
  .score-warn { background: #FFF3E0; } .score-warn .value { color: #B86E00; }
  .score-bad { background: #FFE5E6; } .score-bad .value { color: var(--s2-red-600); }

  /* Page results */
  .page-list { display: grid; gap: 12px; }
  .page-card { padding: 16px; background: white; border: 1px solid var(--s2-gray-100); border-radius: var(--s2-radius-m); }
  .page-card.page-pass { border-left: 3px solid var(--s2-green-500); }
  .page-card.page-warn { border-left: 3px solid #E8A200; }
  .page-card.page-error { border-left: 3px solid var(--s2-red-500); }
  .page-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .page-path { font-size: 12px; color: var(--s2-blue-600); font-family: var(--s2-font-mono); flex: 1; }
  .page-score { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
  .ps-pass { background: #E0F5EC; color: var(--s2-green-600); }
  .ps-warn { background: #FFF3E0; color: #B86E00; }
  .ps-fail { background: #FFE5E6; color: var(--s2-red-600); }

  /* Issues */
  .issue-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--s2-gray-50); font-size: 13px; }
  .issue-row:last-child { border-bottom: none; }
  .issue-sev { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: var(--s2-radius-s); flex-shrink: 0; margin-top: 2px; }
  .sev-error { background: #FFE5E6; color: var(--s2-red-600); }
  .sev-warning { background: #FFF3E0; color: #B86E00; }
  .sev-info { background: var(--s2-gray-75); color: var(--s2-gray-600); }
  .issue-text { flex: 1; color: var(--s2-gray-700); }
  .issue-suggestion { font-size: 12px; color: var(--s2-gray-500); margin-top: 2px; }
  .issue-fix { flex-shrink: 0; }

  /* Fix button */
  .fix-btn { font-size: 11px; padding: 3px 10px; border: 1px solid var(--s2-blue-200); background: var(--s2-blue-50); color: var(--s2-blue-600); border-radius: var(--s2-radius-s); cursor: pointer; font-weight: 500; }
  .fix-btn:hover { background: var(--s2-blue-100); }
  .fix-btn:disabled { opacity: 0.5; cursor: default; }
  .fix-btn.fixing { background: #FFF3E0; border-color: #E8A200; color: #B86E00; }
  .fix-btn.fixed { background: #E0F5EC; border-color: var(--s2-green-300); color: var(--s2-green-600); }
  .fix-all-btn { font-size: 12px; padding: 6px 14px; }

  /* Progress */
  .progress-bar { height: 4px; background: var(--s2-gray-100); border-radius: 2px; margin-bottom: var(--s2-spacing-300); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--s2-blue-500); border-radius: 2px; transition: width 0.3s ease; }
  .status-text { font-size: 12px; color: var(--s2-gray-500); margin-bottom: var(--s2-spacing-200); }

  .section-title { font-size: 14px; font-weight: 600; margin: 24px 0 12px; color: var(--s2-gray-700); display: flex; align-items: center; justify-content: space-between; }
  .loading { text-align: center; padding: 40px; color: var(--s2-gray-400); }
  .empty { text-align: center; padding: 60px 20px; color: var(--s2-gray-400); }
  .empty p { margin: 8px 0; }
  #results { display: none; }
  #progress { display: none; }
</style>

<div class="audit-container">
  <div class="audit-controls">
    <input class="s2-input" id="auditPath" placeholder="Site path to audit (e.g. /tavex)" value="">
    <button class="s2-btn s2-btn-primary" id="runAudit">Run SEO Audit</button>
  </div>
  <div id="progress">
    <div class="status-text" id="statusText">Requesting audit...</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
  </div>
  <div id="results">
    <div class="score-bar" id="scores"></div>
    <div class="section-title">
      <span>Page Results</span>
      <button class="s2-btn s2-btn-primary fix-all-btn" id="fixAll" style="display:none;">Fix All Issues</button>
    </div>
    <div class="page-list" id="pageList"></div>
  </div>
  <div id="empty" class="empty" style="display:none;">
    <p>Click <strong>Run SEO Audit</strong> to analyze your pages.</p>
    <p style="font-size: 12px;">The agent will fetch each page, analyze SEO signals, and suggest fixes.</p>
  </div>
</div>

<script>
(function() {
  var STORAGE_KEY = 'slicc-eds-config';
  var config = null;
  try { config = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {}
  if (config) BB.init(config);

  var pathInput = document.getElementById('auditPath');
  pathInput.value = BB.site.sitePath || '';

  var auditData = null; // Current audit results from agent

  // ── UI State ─────────────────────────────────────────────────────
  function showProgress(text, pct) {
    document.getElementById('progress').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    document.getElementById('empty').style.display = 'none';
    document.getElementById('statusText').textContent = text || 'Working...';
    document.getElementById('progressFill').style.width = (pct || 0) + '%';
  }

  function showResults() {
    document.getElementById('progress').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('empty').style.display = 'none';
  }

  function showEmpty() {
    document.getElementById('progress').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }

  // ── Run Audit (sends lick to agent) ──────────────────────────────
  document.getElementById('runAudit').onclick = function() {
    var path = pathInput.value.trim();
    if (!path) { alert('Enter a site path to audit'); return; }

    showProgress('Requesting SEO audit from agent...', 0);

    if (typeof slicc !== 'undefined') {
      slicc.lick({ action: 'run-audit', data: {
        path: path,
        org: BB.site.org,
        repo: BB.site.repo,
        ref: BB.site.ref || 'main'
      }});
    } else {
      showEmpty();
      alert('No agent connection. Open this page through SLICC to enable agent-powered audits.');
    }
  };

  // ── Fix All ──────────────────────────────────────────────────────
  document.getElementById('fixAll').onclick = function() {
    if (!auditData || !auditData.pages) return;
    var fixable = [];
    auditData.pages.forEach(function(page) {
      (page.issues || []).forEach(function(issue) {
        if (issue.fixable && !issue.fixed) {
          fixable.push({ path: page.path, issueId: issue.id, fixAction: issue.fixAction });
        }
      });
    });
    if (fixable.length === 0) return;

    document.getElementById('fixAll').disabled = true;
    document.getElementById('fixAll').textContent = 'Fixing...';

    if (typeof slicc !== 'undefined') {
      slicc.lick({ action: 'fix-all', data: { fixes: fixable } });
    }
  };

  // ── Fix single issue ─────────────────────────────────────────────
  function fixIssue(path, issueId, fixAction, btn) {
    btn.disabled = true;
    btn.textContent = 'Fixing...';
    btn.className = 'fix-btn fixing';

    if (typeof slicc !== 'undefined') {
      slicc.lick({ action: 'fix-issue', data: { path: path, issueId: issueId, fixAction: fixAction } });
    }
  }

  // ── Render Results ────────────────────────────────────────────────
  function renderResults(data) {
    auditData = data;
    showResults();

    var pages = data.pages || [];
    var summary = data.summary || {};

    // Score cards
    var scoreHtml = '';
    if (summary.overallScore !== undefined) {
      var sc = summary.overallScore;
      var cls = sc >= 80 ? 'score-good' : sc >= 50 ? 'score-warn' : 'score-bad';
      scoreHtml += '<div class="score-card ' + cls + '"><div class="value">' + sc + '%</div><div class="label">SEO Score</div></div>';
    }
    var errors = summary.errors || 0;
    var warnings = summary.warnings || 0;
    scoreHtml += '<div class="score-card ' + (errors === 0 ? 'score-good' : 'score-bad') + '"><div class="value">' + errors + '</div><div class="label">Errors</div></div>';
    scoreHtml += '<div class="score-card ' + (warnings === 0 ? 'score-good' : 'score-warn') + '"><div class="value">' + warnings + '</div><div class="label">Warnings</div></div>';
    scoreHtml += '<div class="score-card score-good"><div class="value">' + (summary.total || pages.length) + '</div><div class="label">Pages</div></div>';
    document.getElementById('scores').innerHTML = scoreHtml;

    // Fix All button
    var fixableCount = 0;
    pages.forEach(function(p) { (p.issues || []).forEach(function(i) { if (i.fixable && !i.fixed) fixableCount++; }); });
    var fixAllBtn = document.getElementById('fixAll');
    fixAllBtn.style.display = fixableCount > 0 ? '' : 'none';
    fixAllBtn.disabled = false;
    fixAllBtn.textContent = 'Fix All Issues (' + fixableCount + ')';

    // Page cards
    var html = '';
    pages.forEach(function(page) {
      var issues = page.issues || [];
      var hasError = issues.some(function(i) { return i.severity === 'error' && !i.fixed; });
      var hasWarn = issues.some(function(i) { return i.severity === 'warning' && !i.fixed; });
      var cardClass = hasError ? 'page-error' : hasWarn ? 'page-warn' : 'page-pass';
      var scoreClass = hasError ? 'ps-fail' : hasWarn ? 'ps-warn' : 'ps-pass';
      var scoreLabel = hasError ? 'Issues' : hasWarn ? 'Warnings' : 'Pass';

      html += '<div class="page-card ' + cardClass + '">';
      html += '<div class="page-header"><span class="page-path">' + BB.escapeHtml(page.path || '') + '</span>';
      html += '<span class="page-score ' + scoreClass + '">' + scoreLabel + '</span></div>';

      if (page.title) {
        html += '<div style="font-size: 13px; font-weight: 500; margin-bottom: 8px;">' + BB.escapeHtml(page.title) + '</div>';
      }

      issues.forEach(function(issue, idx) {
        var sevClass = 'sev-' + (issue.severity || 'info');
        html += '<div class="issue-row">';
        html += '<span class="issue-sev ' + sevClass + '">' + (issue.severity || 'info').toUpperCase() + '</span>';
        html += '<div class="issue-text">' + BB.escapeHtml(issue.description || issue.desc || '');
        if (issue.suggestion) {
          html += '<div class="issue-suggestion">Suggestion: ' + BB.escapeHtml(issue.suggestion) + '</div>';
        }
        html += '</div>';
        if (issue.fixable && !issue.fixed) {
          html += '<div class="issue-fix"><button class="fix-btn" data-path="' + BB.escapeHtml(page.path || '') + '" data-issue="' + BB.escapeHtml(issue.id || '') + '" data-fix="' + BB.escapeHtml(issue.fixAction || '') + '">Fix</button></div>';
        } else if (issue.fixed) {
          html += '<div class="issue-fix"><button class="fix-btn fixed" disabled>Fixed</button></div>';
        }
        html += '</div>';
      });

      if (issues.length === 0) {
        html += '<div style="font-size: 12px; color: var(--s2-gray-400);">No issues found.</div>';
      }

      html += '</div>';
    });

    document.getElementById('pageList').innerHTML = html || '<div class="loading">No pages analyzed.</div>';

    // Attach fix button handlers
    document.querySelectorAll('.fix-btn:not(.fixed):not(.fixing)').forEach(function(btn) {
      btn.onclick = function() {
        fixIssue(btn.dataset.path, btn.dataset.issue, btn.dataset.fix, btn);
      };
    });
  }

  // ── Mark issue as fixed ───────────────────────────────────────────
  function markFixed(path, issueId) {
    if (!auditData || !auditData.pages) return;
    auditData.pages.forEach(function(page) {
      if (page.path === path) {
        (page.issues || []).forEach(function(issue) {
          if (issue.id === issueId) issue.fixed = true;
        });
      }
    });
    renderResults(auditData);
  }

  // ── Listen for agent updates ──────────────────────────────────────
  if (typeof slicc !== 'undefined') {
    slicc.on('update', function(data) {
      if (!data || !data.action) return;

      switch (data.action) {
        case 'audit-progress':
          var pct = data.total > 0 ? Math.round((data.current / data.total) * 100) : 0;
          showProgress(data.message || ('Analyzing page ' + data.current + ' of ' + data.total + '...'), pct);
          break;

        case 'audit-results':
          renderResults(data);
          // Persist for page reload
          slicc.setState({ lastAudit: data, path: pathInput.value });
          break;

        case 'fix-progress':
          // Update a single fix button's state
          var btns = document.querySelectorAll('.fix-btn[data-path="' + data.path + '"][data-issue="' + data.issueId + '"]');
          btns.forEach(function(b) { b.textContent = 'Fixing...'; b.className = 'fix-btn fixing'; b.disabled = true; });
          break;

        case 'fix-complete':
          markFixed(data.path, data.issueId);
          break;

        case 'fix-all-complete':
          (data.fixed || []).forEach(function(f) { markFixed(f.path, f.issueId); });
          document.getElementById('fixAll').disabled = false;
          document.getElementById('fixAll').textContent = 'Fix All Issues';
          break;

        case 'error':
          showResults();
          document.getElementById('pageList').innerHTML = '<div class="loading" style="color: var(--s2-red-600);">Error: ' + BB.escapeHtml(data.message || 'Unknown error') + '</div>';
          break;
      }
    });

    // Restore last audit on reconnect
    slicc.getState().then(function(state) {
      if (state && state.lastAudit) {
        if (state.path) pathInput.value = state.path;
        renderResults(state.lastAudit);
      } else {
        showEmpty();
      }
    });
  } else {
    showEmpty();
  }

  // URL param auto-run
  var params = new URLSearchParams(window.location.search);
  if (params.get('path')) {
    pathInput.value = params.get('path');
  }
})();
</script>
</body>
</html>
