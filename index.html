<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>slicc</title>
    <style>
      /* ------------------------------------------------------------------ */
      /* Reset & base                                                       */
      /* ------------------------------------------------------------------ */
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        font-size: 14px;
        line-height: 1.5;
      }
      #app { height: 100%; display: flex; flex-direction: column; }

      /* ------------------------------------------------------------------ */
      /* Layout                                                             */
      /* ------------------------------------------------------------------ */
      .layout { display: flex; flex: 1; min-height: 0; }
      .layout__scoops { display: flex; flex-direction: column; min-width: 180px; max-width: 300px; }
      .layout__left { display: flex; flex-direction: column; min-width: 320px; }
      .layout__right { display: flex; flex-direction: column; min-width: 240px; overflow: hidden; }
      .layout__divider {
        width: 4px; cursor: col-resize; background: #2a2a4a;
        flex-shrink: 0; transition: background .15s;
      }
      .layout__divider:hover, .layout__divider.active { background: #e94560; }

      /* ------------------------------------------------------------------ */
      /* Header                                                             */
      /* ------------------------------------------------------------------ */
      .header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 16px; background: #16162a; border-bottom: 1px solid #2a2a4a;
        flex-shrink: 0;
      }
      .header__title { font-size: 15px; font-weight: 600; color: #e94560; }
      .header__actions { display: flex; gap: 8px; }
      .header__btn {
        background: #2a2a4a; color: #a0a0b0; border: none; border-radius: 4px;
        padding: 4px 10px; font-size: 12px; cursor: pointer;
      }
      .header__btn:hover { background: #3a3a5a; color: #e0e0e0; }

      /* ------------------------------------------------------------------ */
      /* Chat panel                                                         */
      /* ------------------------------------------------------------------ */
      .chat { display: flex; flex-direction: column; flex: 1; min-height: 0; }
      .chat__messages {
        flex: 1; overflow-y: auto; padding: 16px;
        display: flex; flex-direction: column; gap: 12px;
      }
      .chat__messages::-webkit-scrollbar { width: 6px; }
      .chat__messages::-webkit-scrollbar-track { background: transparent; }
      .chat__messages::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }

      .msg { padding: 10px 14px; border-radius: 8px; max-width: 100%; word-wrap: break-word; }
      .msg--user {
        background: #2a2a5e; align-self: flex-end;
        border-bottom-right-radius: 2px;
      }
      .msg--assistant {
        background: #222240; align-self: flex-start;
        border-bottom-left-radius: 2px;
      }
      .msg--assistant .msg__content { white-space: normal; }
      .msg__role {
        font-size: 11px; font-weight: 600; text-transform: uppercase;
        color: #a0a0b0; margin-bottom: 4px;
      }
      .msg--user .msg__role { color: #7b8cff; }
      .msg--assistant .msg__role { color: #e94560; }

      /* Message icons */
      .msg__icon { font-size: 14px; }

      /* Collapsible messages (licks and scoop messages in cone view) */
      .msg__collapsible {
        cursor: pointer;
      }
      .msg__collapsible summary {
        list-style: none;
        cursor: pointer;
        color: #8080a0;
        font-size: 12px;
        padding: 4px 0;
      }
      .msg__collapsible summary::-webkit-details-marker { display: none; }
      .msg__collapsible summary::before {
        content: '▶ ';
        font-size: 10px;
        color: #6060a0;
        transition: transform 0.2s;
        display: inline-block;
      }
      .msg__collapsible[open] summary::before {
        transform: rotate(90deg);
      }
      .msg__collapsible[open] .msg__content {
        margin-top: 8px;
      }

      /* Tool calls - collapsible */
      .tool-call {
        margin-top: 8px; padding: 0; border-radius: 6px;
        background: #1a1a30; border-left: 3px solid #e94560;
        font-size: 13px;
      }
      .tool-call summary {
        list-style: none;
        cursor: pointer;
        padding: 8px 10px;
        display: flex; align-items: center; gap: 6px;
      }
      .tool-call summary::-webkit-details-marker { display: none; }
      .tool-call__header {
        display: flex; align-items: center; gap: 6px;
        font-weight: 600; color: #e94560;
        cursor: pointer;
      }
      .tool-call__icon { font-size: 14px; }
      .tool-call__name { color: #e94560; }
      .tool-call__preview {
        color: #6a6a8a; font-size: 11px; margin-left: 8px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        max-width: 200px;
      }
      .tool-call__spinner, .tool-call__error-icon, .tool-call__check-icon {
        margin-left: auto; font-size: 12px;
      }
      .tool-call__spinner { animation: spin 1s linear infinite; }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      .tool-call__details {
        padding: 0 10px 10px 10px;
        border-top: 1px solid #2a2a4a;
      }
      .tool-call__label {
        font-size: 10px; color: #6a6a8a; text-transform: uppercase;
        margin-top: 8px; margin-bottom: 4px;
      }
      .tool-call__input pre, .tool-call__result pre {
        white-space: pre-wrap; font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 12px; color: #b0b0c0;
        max-height: 200px; overflow-y: auto;
        background: #141428; padding: 8px; border-radius: 4px;
        margin: 0;
      }
      .tool-call__result--error pre { color: #ff6b6b; }
      .tool-call__screenshot {
        max-width: 100%; max-height: 300px; border-radius: 6px;
        margin-top: 8px; cursor: pointer; border: 1px solid #3a3a5a;
        transition: border-color .15s;
      }
      .tool-call__screenshot:hover { border-color: #e94560; }

      /* Prose element spacing inside rendered markdown messages */
      .msg__content p, .msg__content h1, .msg__content h2, .msg__content h3,
      .msg__content h4, .msg__content h5, .msg__content h6,
      .msg__content ul, .msg__content ol, .msg__content table,
      .msg__content blockquote { margin: 0.45em 0; }
      .msg__content > :first-child { margin-top: 0; }
      .msg__content > :last-child  { margin-bottom: 0; }
      .msg__content h1, .msg__content h2, .msg__content h3 { font-weight: 600; }
      .msg__content ul, .msg__content ol { padding-left: 1.4em; }
      .msg__content table { border-collapse: collapse; font-size: 13px; }
      .msg__content th, .msg__content td {
        border: 1px solid #3a3a5a; padding: 4px 10px; text-align: left;
      }
      .msg__content th { background: #1a1a30; font-weight: 600; }
      .msg__content blockquote {
        border-left: 3px solid #3a3a5a; padding-left: 10px; color: #a0a0b0;
      }
      .msg pre {
        background: #16162a; padding: 10px; border-radius: 4px;
        overflow-x: auto; margin: 8px 0; font-size: 13px;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        white-space: pre-wrap;
      }
      .msg code {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 13px;
      }
      .msg :not(pre) > code {
        background: #2a2a4a; padding: 1px 5px; border-radius: 3px;
      }

      /* Syntax highlighting tokens */
      .tok-keyword { color: #c792ea; }
      .tok-string  { color: #c3e88d; }
      .tok-number  { color: #f78c6c; }
      .tok-comment { color: #546e7a; font-style: italic; }
      .tok-punct   { color: #89ddff; }
      .tok-fn      { color: #82aaff; }

      /* Streaming cursor */
      .streaming-cursor {
        display: inline-block; width: 8px; height: 16px;
        background: #e94560; margin-left: 2px;
        animation: blink 1s step-end infinite; vertical-align: text-bottom;
      }
      @keyframes blink { 50% { opacity: 0; } }

      /* ------------------------------------------------------------------ */
      /* Chat input                                                         */
      /* ------------------------------------------------------------------ */
      .chat__input-area {
        display: flex; align-items: flex-end; gap: 8px;
        padding: 12px 16px; background: #16162a;
        border-top: 1px solid #2a2a4a;
      }
      .chat__textarea {
        flex: 1; resize: none; min-height: 38px; max-height: 120px;
        padding: 8px 12px; border-radius: 6px; border: 1px solid #3a3a5a;
        background: #222240; color: #e0e0e0;
        font-family: inherit; font-size: 14px; line-height: 1.4;
        outline: none;
      }
      .chat__textarea:focus { border-color: #e94560; }
      .chat__textarea::placeholder { color: #5a5a7a; }
      .chat__send-btn {
        width: 38px; height: 38px; border: none; border-radius: 6px;
        background: #e94560; color: #fff; font-size: 18px;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .chat__send-btn:hover { background: #d1334e; }
      .chat__send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .chat__stop-btn {
        width: 38px; height: 38px; border: none; border-radius: 6px;
        background: #ff6b6b; color: #fff; font-size: 14px;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }

      /* ------------------------------------------------------------------ */
      /* Panel headers                                                      */
      /* ------------------------------------------------------------------ */
      .panel-header {
        display: flex; align-items: center; padding: 6px 12px;
        background: #16162a; border-bottom: 1px solid #2a2a4a;
        font-size: 12px; font-weight: 600; color: #a0a0b0;
        text-transform: uppercase; letter-spacing: 0.5px;
        flex-shrink: 0;
      }

      /* ------------------------------------------------------------------ */
      /* Terminal panel                                                     */
      /* ------------------------------------------------------------------ */
      .terminal-panel { flex: 1; min-height: 0; display: flex; flex-direction: column; }
      .terminal-panel__body {
        flex: 1; min-height: 0; overflow: hidden;
        display: flex; flex-direction: column;
      }
      .terminal-panel__content {
        flex: 1; min-height: 0; overflow: hidden;
        display: flex; flex-direction: column;
      }
      .terminal-panel__view {
        flex: 1; min-height: 0; overflow: hidden;
        display: flex; flex-direction: column; padding: 4px;
      }
      .terminal-panel__mount { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
      .terminal-panel__terminal-host { flex: 1; min-height: 0; overflow: hidden; }
      .terminal-panel__preview {
        display: none; flex: 1; min-height: 0; overflow: auto;
        padding: 12px; border-radius: 6px; background: #141426; border: 1px solid #2a2a4a;
      }
      .terminal-panel__preview--visible { display: flex; flex-direction: column; }
      .terminal-panel__preview-item { display: flex; flex-direction: column; gap: 8px; }
      .terminal-panel__preview-item + .terminal-panel__preview-item { margin-top: 12px; }
      .terminal-panel__preview-label {
        color: #8f90a8; font-size: 11px; font-family: 'JetBrains Mono', 'Fira Code', monospace;
      }
      .terminal-panel__preview-media {
        display: block; width: 100%; max-width: 100%; max-height: min(100%, 520px);
        object-fit: contain; border-radius: 4px; background: #0b0c16; border: 1px solid #30324a;
      }
      .terminal-panel__empty-state {
        flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center;
        padding: 24px; color: #6f7088; font-size: 12px; text-transform: uppercase;
        letter-spacing: 0.08em; border: 1px dashed #2f3148; border-radius: 6px; background: #141426;
      }

      /* ------------------------------------------------------------------ */
      /* Horizontal divider (terminal / file browser)                       */
      /* ------------------------------------------------------------------ */
      .layout__right-divider {
        height: 4px; cursor: row-resize; background: #2a2a4a;
        flex-shrink: 0; transition: background .15s;
      }
      .layout__right-divider:hover, .layout__right-divider.active { background: #e94560; }

      /* ------------------------------------------------------------------ */
      /* File browser panel                                                 */
      /* ------------------------------------------------------------------ */
      .file-browser { flex: 1; min-height: 0; display: flex; flex-direction: column; }
      .file-browser__body {
        flex: 1; min-height: 0; overflow-y: auto; padding: 4px 0;
        font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px;
      }
      .file-browser__body::-webkit-scrollbar { width: 6px; }
      .file-browser__body::-webkit-scrollbar-track { background: transparent; }
      .file-browser__body::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }
      .file-browser__item {
        display: flex; align-items: center; gap: 4px;
        padding: 2px 8px; color: #c0c0d0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .file-browser__item:hover { background: #2a2a4a; }
      .file-browser__arrow { width: 12px; text-align: center; flex-shrink: 0; color: #666; font-size: 10px; }
      .file-browser__icon { flex-shrink: 0; font-size: 13px; }
      .file-browser__name { overflow: hidden; text-overflow: ellipsis; }
      .file-browser__size { margin-left: auto; color: #666; font-size: 11px; flex-shrink: 0; padding-left: 8px; }
      .file-browser__action-btn {
        background: #2a2a4a; border: 1px solid #3a3a5a;
        color: #a0a0b0; cursor: pointer; font-size: 11px; padding: 1px 6px;
        border-radius: 3px; flex-shrink: 0; line-height: 1.4;
      }
      .file-browser__action-btn:hover { background: #e94560; color: #fff; border-color: #e94560; }
      .file-browser__action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      /* ------------------------------------------------------------------ */
      /* Memory panel                                                       */
      /* ------------------------------------------------------------------ */
      .memory-panel { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
      .memory-panel__body {
        flex: 1; min-height: 0; overflow-y: auto; padding: 8px;
        font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px;
        height: 100%;
      }
      .memory-panel__section { margin-bottom: 16px; }
      .memory-panel__section-header {
        font-weight: 600; color: #e94560; margin-bottom: 8px;
        padding-bottom: 4px; border-bottom: 1px solid #2a2a4a;
      }
      .memory-panel__memory-content {
        white-space: pre-wrap; color: #c0c0d0; line-height: 1.5;
        background: #1a1a2e; padding: 8px; border-radius: 4px;
      }

      /* ------------------------------------------------------------------ */
      /* Mini tabs (Files/Memory)                                           */
      /* ------------------------------------------------------------------ */
      .mini-tabs {
        display: flex; background: #1a1a2e; border-bottom: 1px solid #2a2a4a; flex-shrink: 0;
      }
      .mini-tabs__tab {
        flex: 1; padding: 6px 8px; border: none; background: transparent;
        color: #6a6a8a; font-size: 11px; font-weight: 600;
        cursor: pointer; text-align: center;
        border-bottom: 2px solid transparent;
      }
      .mini-tabs__tab:hover { color: #a0a0b0; }
      .mini-tabs__tab--active { color: #e94560; border-bottom-color: #e94560; }
      .mini-tabs__tab:disabled {
        color: #4f5068; cursor: not-allowed;
      }

      /* ------------------------------------------------------------------ */
      /* Tab bar (extension mode)                                           */
      /* ------------------------------------------------------------------ */
      .tab-bar {
        display: flex; background: #16162a;
        border-bottom: 1px solid #2a2a4a; flex-shrink: 0;
      }
      .tab-bar__tab {
        flex: 1; padding: 8px 0; border: none; background: transparent;
        color: #6a6a8a; font-size: 13px; font-weight: 600;
        cursor: pointer; text-align: center;
        border-bottom: 2px solid transparent;
        transition: color .15s, border-color .15s;
      }
      .tab-bar__tab:hover { color: #a0a0b0; }
      .tab-bar__tab--active {
        color: #e94560; border-bottom-color: #e94560;
      }
      .tab-content {
        flex: 1; min-height: 0; display: flex; flex-direction: column;
      }
      .tab-content__panel {
        flex: 1; min-height: 0; display: flex; flex-direction: column;
        overflow: hidden;
      }

      /* ------------------------------------------------------------------ */
      /* API key dialog                                                     */
      /* ------------------------------------------------------------------ */
      .dialog-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,.6);
        display: flex; align-items: center; justify-content: center; z-index: 100;
      }
      .dialog {
        background: #222240; border-radius: 10px; padding: 28px;
        width: 420px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,.4);
      }
      .dialog__title { font-size: 18px; font-weight: 700; color: #e94560; margin-bottom: 8px; }
      .dialog__desc { font-size: 13px; color: #a0a0b0; margin-bottom: 16px; }
      .dialog__input {
        width: 100%; padding: 10px 12px; border-radius: 6px;
        border: 1px solid #3a3a5a; background: #1a1a2e; color: #e0e0e0;
        font-family: monospace; font-size: 14px; margin-bottom: 16px; outline: none;
      }
      .dialog__input:focus { border-color: #e94560; }
      .dialog__btn {
        width: 100%; padding: 10px; border: none; border-radius: 6px;
        background: #e94560; color: #fff; font-size: 14px; font-weight: 600;
        cursor: pointer;
      }
      .dialog__btn:hover { background: #d1334e; }
      .dialog__btn:disabled { opacity: .5; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/ui/main.ts"></script>
  </body>
</html>
