name: SliccFollower
options:
  bundleIdPrefix: com.sliccy
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: '5.9'
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: '1.0.0'
    CURRENT_PROJECT_VERSION: 1
    SUPPORTED_PLATFORMS: 'iphoneos iphonesimulator'
    SUPPORTS_MACCATALYST: NO
targets:
  SliccFollower:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: SliccFollower
        # Test sources (XCTest) must not compile into the app target — there is
        # no XCTest test target yet (see packages/ios-app/CLAUDE.md), and the
        # app target globs all of SliccFollower/. Excluding Tests/ keeps
        # `xcodebuild build` green; the test file stays for a future test target.
        excludes:
          - Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sliccy.follower
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: 'UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
        TARGETED_DEVICE_FAMILY: '1'
        PRODUCT_NAME: SliccFollower
        SUPPORTED_PLATFORMS: 'iphoneos iphonesimulator'
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_NSCameraUsageDescription: 'This app does not access the camera. This entry is required because the bundled WebRTC framework references camera APIs.'
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    dependencies:
      - package: WebRTC
      - sdk: WebKit.framework
      - sdk: AVFoundation.framework
packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 149.0.0
