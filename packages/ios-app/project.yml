name: SliccFollower
options:
  bundleIdPrefix: com.slicc
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: '5.9'
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: '1.0.0'
    CURRENT_PROJECT_VERSION: 1
    SUPPORTED_PLATFORMS: 'iphoneos iphonesimulator'
    SUPPORTS_MACCATALYST: NO
targets:
  SliccFollower:
    type: application
    supportedDestinations: [iOS]
    sources:
      - SliccFollower
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slicc.follower
        INFOPLIST_KEY_NSCameraUsageDescription: 'Scan QR codes to connect to a tray'
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: 'UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
        TARGETED_DEVICE_FAMILY: '1,2'
        PRODUCT_NAME: SliccFollower
        SUPPORTED_PLATFORMS: 'iphoneos iphonesimulator'
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - package: WebRTC
      - framework: WebKit.framework
        implicit: true
      - sdk: AVFoundation.framework
packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 125.0.0
