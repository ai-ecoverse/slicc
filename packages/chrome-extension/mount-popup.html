<!doctype html>
<html>
  <head>
    <title>slicc mount</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        margin: 0;
        padding: 16px;
        user-select: none;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a2e;
          color: #e0e0e0;
        }
      }
      .btn {
        padding: 8px 20px;
        border-radius: 8px;
        border: none;
        background: #3562ff;
        color: #fff;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:hover {
        background: #4a75ff;
      }
      .label {
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <button class="btn" id="pickBtn">Select directory</button>
    <div class="label" id="label" style="display: none">Storing...</div>
    <script src="mount-popup.js"></script>
