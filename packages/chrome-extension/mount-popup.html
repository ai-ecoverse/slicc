<!doctype html>
<html>
  <head>
    <title>slicc mount</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
        user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .btn {
        padding: 10px 24px;
        border-radius: 8px;
        border: none;
        background: #3562ff;
        color: #fff;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:hover {
        background: #4a75ff;
      }
      .label {
        font-size: 13px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <button class="btn" id="pickBtn" onclick="pickDirectory()">Select directory</button>
    <div class="label" id="label" style="display: none">Opening picker...</div>
    <script>
      var PENDING_MOUNT_DB = 'slicc-pending-mount';
      var requestId = new URLSearchParams(location.search).get('requestId') || '';

      function send(msg) {
        try {
          chrome.runtime.sendMessage(msg, function () {
            if (chrome.runtime.lastError) {
              /* no receiver */
            }
          });
        } catch (e) {
          /* context invalidated */
        }
      }

      function openDb() {
        return new Promise(function (resolve, reject) {
          var req = indexedDB.open(PENDING_MOUNT_DB, 1);
          req.onupgradeneeded = function () {
            if (!req.result.objectStoreNames.contains('handles')) {
              req.result.createObjectStore('handles');
            }
          };
          req.onsuccess = function () {
            resolve(req.result);
          };
          req.onerror = function () {
            reject(req.error);
          };
        });
      }

      async function pickDirectory() {
        document.getElementById('pickBtn').style.display = 'none';
        document.getElementById('label').style.display = '';
        try {
          var handle = await window.showDirectoryPicker({ mode: 'readwrite' });
          document.getElementById('label').textContent = 'Storing handle...';
          var idbKey = 'pendingMount:' + requestId;
          var db = await openDb();
          var tx = db.transaction('handles', 'readwrite');
          tx.objectStore('handles').put(handle, idbKey);
          await new Promise(function (resolve, reject) {
            tx.oncomplete = resolve;
            tx.onerror = function () {
              reject(tx.error);
            };
            tx.onabort = function () {
              reject(tx.error || new Error('Transaction aborted'));
            };
          });
          db.close();
          send({
            source: 'mount-popup',
            type: 'mount-result',
            requestId: requestId,
            handleInIdb: true,
            idbKey: idbKey,
            dirName: handle.name,
          });
        } catch (err) {
          if (err && err.name === 'AbortError') {
            send({
              source: 'mount-popup',
              type: 'mount-result',
              requestId: requestId,
              cancelled: true,
            });
          } else {
            send({
              source: 'mount-popup',
              type: 'mount-result',
              requestId: requestId,
              error: err ? err.message || String(err) : 'Unknown error',
            });
          }
        }
        window.close();
      }
    </script>
  </body>
</html>
