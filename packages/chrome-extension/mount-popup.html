<!doctype html>
<html>
  <head>
    <title>slicc mount</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
        user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .btn {
        padding: 10px 24px;
        border-radius: 8px;
        border: none;
        background: #3562ff;
        color: #fff;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:hover {
        background: #4a75ff;
      }
      .label {
        font-size: 13px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <button class="btn" id="pickBtn">Select directory</button>
    <div class="label" id="label" style="display: none">Opening picker...</div>
    <script src="mount-popup.js"></script>
  </body>
</html>
