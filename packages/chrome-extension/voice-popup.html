<!doctype html>
<html>
  <head>
    <title>slicc voice</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
        padding: 12px 16px;
        user-select: none;
        overflow: hidden;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #e94560;
        animation: pulse 1.5s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .dot--idle {
        background: #3a3a5a;
        animation: none;
      }
      .dot--error {
        background: #ff6b6b;
        animation: none;
      }
      .label {
        font-size: 13px;
        flex: 1;
      }
      .hint {
        font-size: 11px;
        color: #6a6a8a;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="dot" id="dot"></div>
      <div class="label" id="label">Requesting mic...</div>
    </div>
    <div class="hint" id="hint">Allow microphone when prompted</div>
    <script src="voice-popup.js"></script>
  </body>
</html>
