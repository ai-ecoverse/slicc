<div class="sprinkle-card" style="padding: 16px;">
  <h3 style="margin: 0 0 12px;">Stop Cone Test</h3>
  <p id="status" style="margin: 0 0 12px; opacity: 0.7;">Ready</p>
  <div style="display: flex; gap: 8px;">
    <button
      class="sprinkle-btn sprinkle-btn--primary"
      id="go-btn"
      onclick="go()"
    >
      GO
    </button>
    <button
      class="sprinkle-btn sprinkle-btn--secondary"
      id="cancel-btn"
      onclick="cancel()"
    >
      CANCEL
    </button>
  </div>
</div>
<script>
  function go() {
    document.getElementById('status').textContent = 'Sent count request...';
    slicc.lick({ action: 'count', data: { to: 100 } });
  }
  function log(msg) {
    var el = document.getElementById('status');
    el.textContent = msg;
    console.log('[stop-test] ' + msg);
  }
  function cancel() {
    try {
      log('1. Calling stopCone...');
      slicc.stopCone();
      log('2. stopCone called, scheduling lick in 500ms...');
      setTimeout(function () {
        try {
          log('3. Timeout fired, calling slicc.lick...');
          slicc.lick({
            action: 'stop-and-close-all-scoops',
            data: {
              instruction: 'List all scoops with list_scoops. For each non-cone scoop, call drop_scoop to stop and remove it. Do not drop the cone itself.'
            }
          });
          log('4. slicc.lick() returned OK');
        } catch (e) {
          log('ERR in timeout: ' + e.message);
        }
      }, 500);
    } catch (e) {
      log('ERR in cancel: ' + e.message);
    }
  }
</script>
