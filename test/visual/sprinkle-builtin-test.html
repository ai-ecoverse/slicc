.sprinkle-card {

  overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.sprinkle-card__header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; cursor: pointer; user-select: none;
  border-bottom: 1px solid #e9e9e9;
}
.sprinkle-card__header:hover { background: #f8f8f8; }
.sprinkle-card__name { font-size: 14px; font-weight: 700; color: #292929; }
.sprinkle-card__path { font-size: 11px; color: #8f8f8f; font-family: monospace; }
.sprinkle-card__status { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
.sprinkle-card__status--ok { background: #d7f7e1; color: #079355; }
.sprinkle-card__status--loading { background: #e5f0fe; color: #3b63fb; }
.sprinkle-card__status--error { background: #ffe8f0; color: #d92361; }
.sprinkle-card__chevron { font-size: 10px; color: #8f8f8f; transition: transform 200ms ease; }
.sprinkle-card--open .sprinkle-card__chevron { transform: rotate(90deg); }
.sprinkle-card__body { display: none; }
.sprinkle-card--open .sprinkle-card__body { display: block; }
.sprinkle-card__body iframe {
  width: 100%; border: none; display: block;
  min-height: 500px;
}
#status-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 8px 24px; background: #292929; color: #cfcfcf;
  font-size: 12px; z-index: 100; display: flex; gap: 16px;
}

        { term: 'guaranteed', suggestion: 'demonstrated in clinical trials' },
        { term: 'best', suggestion: 'an effective' },
        { term: 'no side effects', suggestion: 'favorable benefit-risk profile' }
      ],
      requiredTerms: ['See full Prescribing Information', 'Boxed Warning', 'TAVEX (tavexirel)'],
      readingTarget: { min: 8, max: 12 }
    },
    presets: {
      'pharma-hcp': { label: 'Pharma \u2014 HCP Audience', formality: 5, bannedTerms: [{ term: 'cure', suggestion: 'treatment option' }, { term: 'safe', suggestion: 'well-tolerated' }], requiredTerms: ['See full Prescribing Information', 'Boxed Warning'], readingTarget: { min: 10, max: 16 } },
      'pharma-patient': { label: 'Pharma \u2014 Patient Audience', formality: 3, bannedTerms: [{ term: 'cure', suggestion: 'may help with' }, { term: 'guaranteed', suggestion: 'may' }], requiredTerms: ['Talk to your doctor', 'See full Prescribing Information'], readingTarget: { min: 6, max: 9 } }
    },
    preset: 'pharma-hcp'
  }
};

// Step 1: fetch production CSS from index.html
fetch('/index.html')
  .then(function(r) { return r.text(); })
  .then(function(html) {
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    var styles = doc.querySelectorAll('style');
    var cssChunks = [];
    styles.forEach(function(s) { cssChunks.push(s.textContent); });
    themeCSS = cssChunks.join('\n');
    updateStatus('Loaded ' + styles.length + ' style blocks. Building cards...');
    buildCards();
  })
  .catch(function(err) {
    updateStatus('ERROR: ' + err.message + ' — is Vite running?', true);
  });

function buildCards() {
  var grid = document.getElementById('grid');
  SPRINKLES.forEach(function(name) {
    var card = document.createElement('div');
    card.className = 'sprinkle-card';
    card.id = 'card-' + name;
    card.innerHTML =
      '<div class="sprinkle-card__header" onclick="toggleCard(\'' + name + '\')">' +
        '<div>' +
          '<div class="sprinkle-card__name">' + name + '</div>' +
          '<div class="sprinkle-card__path">src/defaults/shared/sprinkles/' + name + '/' + name + '.shtml</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span class="sprinkle-card__status sprinkle-card__status--loading" id="status-' + name + '">idle</span>' +
          '<span class="sprinkle-card__chevron">&#9654;</span>' +
        '</div>' +
      '</div>' +
      '<div class="sprinkle-card__body" id="body-' + name + '"></div>';
    grid.appendChild(card);
  });
  updateStatus('Ready. Click a sprinkle to load it.');
}

function toggleCard(name) {
  var card = document.getElementById('card-' + name);
  var isOpen = card.classList.toggle('sprinkle-card--open');
  if (isOpen) loadSprinkle(name);
}

function toggleAll() {
  allExpanded = !allExpanded;
  SPRINKLES.forEach(function(name) {
    var card = document.getElementById('card-' + name);
    if (allExpanded) {
      card.classList.add('sprinkle-card--open');
      loadSprinkle(name);
    } else {
      card.classList.remove('sprinkle-card--open');
    }
  });
  document.querySelector('.expand-btn').textContent = allExpanded ? 'Collapse All' : 'Expand All';
}

function loadSprinkle(name) {
  var body = document.getElementById('body-' + name);
  if (body.dataset.loaded) return; // already loaded
  body.dataset.loaded = '1';

  var statusEl = document.getElementById('status-' + name);
  statusEl.textContent = 'loading';
  statusEl.className = 'sprinkle-card__status sprinkle-card__status--loading';

  var path = '/src/defaults/shared/sprinkles/' + name + '/' + name + '.shtml';
  fetch(path)
    .then(function(r) {
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
      return r.text();
    })
    .then(function(html) {
      // Only inject theme CSS into the HTML (no scripts — those are injected via eval after load)
      var injected = injectThemeCSS(html);
      var iframe = document.createElement('iframe');
      iframe.style.cssText = 'width:100%;border:none;display:block;min-height:500px;';

      // Auto-resize iframe
      window.addEventListener('message', function(e) {
        if (e.source === iframe.contentWindow && e.data && e.data.type === 'sprinkle-height') {
          iframe.style.height = Math.max(e.data.height, 200) + 'px';
        }
      });

      iframe.onload = function() {
        try {
          var win = iframe.contentWindow;
          // Inject bridge via eval (proven to work in sandboxed iframes)
          win.eval('(function(){var h={};window.slicc=window.bridge={lick:function(e){console.log("[' + name + '] lick:",e);},on:function(e,f){h[e]=h[e]||[];h[e].push(f);},getState:function(){return null;},setState:function(){},emit:function(e,d){(h[e]||[]).forEach(function(f){f(d);});}};})()');

          // Re-run the sprinkle's own scripts so they can register slicc.on('update')
          var scripts = win.document.querySelectorAll('script');
          scripts.forEach(function(sc) {
            if (sc.textContent && sc.textContent.length > 10) {
              try { win.eval(sc.textContent); } catch(e) { /* sprinkle script errors are ok */ }
            }
          });

          // Push mock data after a short delay to let the sprinkle initialize
          if (MOCK_DATA[name]) {
            setTimeout(function() {
              try {
                win.slicc.emit('update', MOCK_DATA[name]);
              } catch(e) { console.log('[' + name + '] data push error:', e.message); }
            }, 100);
          }

          // Height reporting
          function reportHeight() {
            try {
              var h = win.document.documentElement.scrollHeight;
              iframe.style.height = Math.max(h, 200) + 'px';
            } catch(e) {}
          }
          reportHeight();
          try { new ResizeObserver(reportHeight).observe(win.document.body); } catch(e) {}
        } catch(e) {
          console.log('[' + name + '] injection error:', e.message);
        }
      };

      iframe.srcdoc = injected;
      body.appendChild(iframe);
      statusEl.textContent = 'loaded';
      statusEl.className = 'sprinkle-card__status sprinkle-card__status--ok';
    })
    .catch(function(err) {
      statusEl.textContent = 'error';
      statusEl.className = 'sprinkle-card__status sprinkle-card__status--error';
      body.innerHTML = '<div style="padding:20px;color:#d92361;font-size:13px">Failed to load: ' + err.message + '</div>';
    });
}

function injectThemeCSS(html) {
  // Apply current theme class
  var themeClass = document.documentElement.classList.contains('theme-light') ? 'theme-light' : '';
  html = html.replace(/<html([^>]*)>/, '<html$1 class="' + themeClass + '">');

  // Inject theme CSS into <head>
  var themeStyle = '<style id="injected-theme">' + themeCSS + '</style>';
  var overrides = '<style>html,body{overflow:auto !important;height:auto !important;}</style>';

  if (html.indexOf('</head>') !== -1) {
    html = html.replace('</head>', themeStyle + overrides + '</head>');
  } else {
    html = themeStyle + overrides + html;
  }

  return html;
}

function setTheme(t) {
  document.documentElement.classList.toggle('theme-light', t === 'light');
  document.querySelectorAll('[data-theme]').forEach(function(b) {
    b.classList.toggle('active', b.dataset.theme === t);
  });
  // Reload all loaded sprinkles with new theme
  SPRINKLES.forEach(function(name) {
    var body = document.getElementById('body-' + name);
    if (body && body.dataset.loaded) {
      body.dataset.loaded = '';
      body.innerHTML = '';
      loadSprinkle(name);
    }
  });
}

function updateStatus(msg, isError) {
  var bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.style.background = isError ? '#d92361' : '#292929';
}
</script>
