name: AI Comment Detection

# Labels PR and issue threads by who is doing the talking, to keep human
# contributions from drowning in bot/AI chatter:
#   • ai-generated      — every contribution on the thread is bot/AI
#   • human-in-the-loop — at least one human has contributed
#
# Each PR body, comment, and review is classified by a cost-ordered cascade
# (account check → markdown density → similarity → Pangram AI detection); see
# packages/dev-tools/ai-comment-detection/. Pure logic is unit-tested in the
# `dev-tools` vitest project; only the driver does network I/O.
#
# Optional repository secret:
#   PANGRAM_API_KEY  x-api-key for the Pangram async detection API. When unset
#                    the cascade simply skips its last-resort fallback (cheap
#                    and medium heuristics still run); the run does not fail.

on:
  pull_request:
    types: [opened, edited, reopened]
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]
  # Per-inline-comment events are kept so a human inline reply/edit reclassifies
  # the thread promptly: GitHub emits pull_request_review_comment (not a fresh
  # pull_request_review) when a comment is added to or edited on an existing
  # review, so without this an AI-only thread could stay mislabelled until an
  # unrelated event fires. The burst of runs this can cause is no longer a
  # problem — queue: max (below) lets them all wait and run green instead of
  # cancelling them into red "cancelled" checks, and each run early-exits fast on
  # an already-sticky human-in-the-loop thread.
  pull_request_review_comment:
    types: [created, edited]

# Serialize per thread so concurrent events don't race on the label edit, and
# queue overlaps instead of cancelling them. cancel-in-progress: false keeps the
# running job alive; queue: max lets up to 100 further runs wait as `pending`
# rather than being cancelled. This matters because the default queue behaviour
# (queue: single) keeps only ONE pending run — a third event in a burst cancels
# the second (a red "cancelled" check), so cancel-in-progress: false alone does
# not quiet bursts. Each run re-reads the whole thread, so a superseded run is
# redundant, not wrong. PR/review events carry pull_request.number; the issues
# and issue_comment events carry issue.number (PRs and issues share one number
# namespace, so the group is unique either way).
concurrency:
  group: ai-comment-detection-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false
  queue: max

permissions:
  contents: read
  pull-requests: write # apply/remove labels on PR threads
  issues: write # apply/remove labels on issue threads

jobs:
  classify:
    # Forked pull_request / review events run with a read-only token (GitHub
    # downgrades write scopes for PRs from forks), so the label writes below
    # would fail the check and leave the thread unlabelled. Skip those; fork PRs
    # are still labelled via issue_comment events, which always run with the base
    # repo's write token. Non-PR events (issues, issue_comment) have no
    # pull_request payload and always run.
    if: >-
      github.event.pull_request == null ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to immutable commit SHAs (matching
      # .github/workflows/ci.yml).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24

      - name: Ensure thread labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create ai-generated --color 5319E7 \
            --description "Every contribution on this thread is bot/AI" --force
          gh label create human-in-the-loop --color 0E8A16 \
            --description "At least one human has contributed to this thread" --force

      - name: Classify thread contributions and apply label
        env:
          GH_TOKEN: ${{ github.token }}
          PANGRAM_API_KEY: ${{ secrets.PANGRAM_API_KEY }}
        run: node packages/dev-tools/ai-comment-detection/detect-comment-authors.mjs
