name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run build:extension

      - name: Import Apple certificates
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Import certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          
          # Store keychain path for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build and sign Sliccstart
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          cd sliccstart
          chmod +x build-app.sh
          ./build-app.sh
          
          # Code sign if certificate is available
          if [ -n "$APPLE_TEAM_ID" ]; then
            echo "Code signing Sliccstart.app..."
            codesign --force --options runtime --sign "Developer ID Application: Lars Trieloff ($APPLE_TEAM_ID)" \
              --timestamp build/Sliccstart.app
            
            # Verify signature
            codesign --verify --verbose build/Sliccstart.app
            
            # Create ZIP for notarization
            ditto -c -k --keepParent build/Sliccstart.app build/Sliccstart.zip
            
            # Notarize
            echo "Submitting for notarization..."
            xcrun notarytool submit build/Sliccstart.zip \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --wait
            
            # Staple the notarization ticket
            xcrun stapler staple build/Sliccstart.app
            
            # Re-create ZIP with stapled app
            rm build/Sliccstart.zip
            ditto -c -k --keepParent build/Sliccstart.app build/Sliccstart.zip
          else
            echo "Skipping code signing (no APPLE_TEAM_ID)"
            ditto -c -k --keepParent build/Sliccstart.app build/Sliccstart.zip
          fi
          
          # Copy to artifacts directory
          mkdir -p ../artifacts/release
          cp build/Sliccstart.zip ../artifacts/release/Sliccstart-macos.zip

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_BASE_URL: https://slicc-tray-hub.minivelos.workers.dev
        run: npx semantic-release

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
