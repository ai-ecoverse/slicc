      - name: Build
        run: npm run build -w @ai-ecoverse/cherry

  swift-server:
    needs: [changes, lint]
    if: >-
      needs.lint.result == 'success' &&
      needs.changes.outputs.is-queue-leader == 'true' &&
      (needs.changes.outputs.swift-server == 'true' ||
      needs.changes.outputs.swift-config == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # swift-coverage-check.sh reads its floors from coverage-thresholds.json
      # via node, so pin Node (matches the other jobs) instead of relying on
      # the runner's preinstalled version.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint (SwiftLint)
        run: cd packages/swift-server && swiftlint lint --reporter github-actions-logging
      - name: Build
        run: cd packages/swift-server && swift build -c release
      - name: Test (with coverage threshold gate)
        run: |
          ./packages/dev-tools/tools/swift-coverage-check.sh \
            packages/swift-server SliccServerPackageTests
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-swift-server
          path: packages/swift-server/.build/coverage/
          if-no-files-found: ignore
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery
      - name: Dead code detection (Periphery)
        run: |
          # Informational scan; surfaces unused Swift declarations without
          # blocking PRs while existing findings get cleaned up incrementally.
          cd packages/swift-server && periphery scan --disable-update-check || true

  swift-optel:
    needs: [changes, lint]
    if: >-
      needs.lint.result == 'success' &&
      needs.changes.outputs.is-queue-leader == 'true' &&
      (needs.changes.outputs.swift-optel == 'true' ||
      needs.changes.outputs.swift-config == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # swift-coverage-check.sh reads its floors from coverage-thresholds.json
      # via node, so pin Node (matches the other jobs) instead of relying on
      # the runner's preinstalled version.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint (SwiftLint)
        run: cd packages/swift-optel && swiftlint lint --reporter github-actions-logging
      - name: Build
        run: cd packages/swift-optel && swift build -c release
      - name: Test (with coverage threshold gate)
        run: |
          ./packages/dev-tools/tools/swift-coverage-check.sh \
            packages/swift-optel SwiftOptelPackageTests
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-swift-optel
          path: packages/swift-optel/.build/coverage/
          if-no-files-found: ignore
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery
      - name: Dead code detection (Periphery)
        run: |
          # Informational scan; surfaces unused Swift declarations without
          # blocking PRs while existing findings get cleaned up incrementally.
          cd packages/swift-optel && periphery scan --disable-update-check || true

  swift-launcher:
    needs: [changes, lint]
    # The launcher no longer bundles the webapp (`dist/ui`) — the UI loads from
    # the hosted origin — so webapp/vfs-root changes no longer trigger this slow
    # macos-latest job. The ONE web artifact it still embeds is the overlay
    # bootstrap, which now lives in the small `@ai-ecoverse/spoon` package, so a
    # `packages/spoon/**` change DOES trigger this job (and only that, not a
    # general webapp UI change). Assets still matter: `assemble-app.mjs` reads the
    # macOS icon from `packages/assets/`, so an asset-only PR must still build
    # Sliccstart.app. A pure webapp/vfs-root PR now skips swift-launcher entirely
    # (skipped = passing in the `ci` summary gate).
    if: >-
      needs.lint.result == 'success' &&
      needs.changes.outputs.is-queue-leader == 'true' &&
      (needs.changes.outputs.swift-launcher == 'true' ||
      needs.changes.outputs.swift-server == 'true' ||
      needs.changes.outputs.swift-optel == 'true' ||
      needs.changes.outputs.swift-config == 'true' ||
      needs.changes.outputs.spoon == 'true' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.root-config == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint (SwiftLint)
        run: cd packages/swift-launcher && swiftlint lint --reporter github-actions-logging
      - name: Build swift-server (dependency)
        run: cd packages/swift-server && swift build -c release
      - name: Test (with coverage threshold gate)
        env:
          # UpdateCheckIntegrationTests hits the real GitHub API.
          # Authenticate to lift the 60/hr unauth limit (which is shared per
          # runner IP and routinely exhausted on `macos-latest`) up to the
          # 5,000/hr authenticated limit.
          GH_TOKEN: ${{ github.token }}
        run: |
          ./packages/dev-tools/tools/swift-coverage-check.sh \
            packages/swift-launcher SliccstartPackageTests
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-swift-launcher
          path: packages/swift-launcher/.build/coverage/
          if-no-files-found: ignore
      - name: Build overlay bootstrap (dist/ui/electron-overlay-entry.js)
        # `assemble-app.mjs` copies ONLY `dist/ui/electron-overlay-entry.js`
        # into the bundle so packaged `slicc-server --electron` loads the real
        # overlay instead of the inline fallback. The launcher no longer bundles
        # the rest of `dist/ui` (the UI loads from the hosted origin); the overlay
        # bootstrap is produced by the small `@ai-ecoverse/spoon` package (a fast,
        # webapp-free esbuild) and must exist before assembly or
        # `copyElectronOverlayEntry` fails fast.
        run: npm run build -w @ai-ecoverse/spoon
      - name: Build
        run: npm run build -w @slicc/swift-launcher
      - name: Upload Sliccstart.app artifact (unsigned, for PR verification)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Sliccstart-${{ github.event.pull_request.number || github.run_id }}-unsigned
          path: packages/swift-launcher/build/Sliccstart.app
          if-no-files-found: error
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery
      - name: Dead code detection (Periphery)
        run: |
          # Informational scan; surfaces unused Swift declarations without
          # blocking PRs while existing findings get cleaned up incrementally.
          cd packages/swift-launcher && periphery scan --disable-update-check || true

  ios-app:
    needs: [changes, lint]
    if: >-
      needs.lint.result == 'success' &&
      (needs.changes.outputs.ios-app == 'true' ||
      needs.changes.outputs.swift-config == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint (SwiftLint)
        run: cd packages/ios-app && swiftlint lint --reporter github-actions-logging
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: cd packages/ios-app && xcodegen generate
      - name: Resolve SPM dependencies
        run: |
          cd packages/ios-app
          xcodebuild -resolvePackageDependencies \
            -project SliccFollower.xcodeproj \
            -scheme SliccFollower
      - name: Build
        run: |
          set -o pipefail
          cd packages/ios-app
          xcodebuild build \
            -project SliccFollower.xcodeproj \
            -scheme SliccFollower \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  global-install:
    needs: changes
    if: >-
      needs.changes.outputs.cloud-core == 'true' ||
      needs.changes.outputs.node-server == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build @slicc/shared-ts
        run: npm run build -w @slicc/shared-ts
      - name: Build node-server
        run: npm run build -w @slicc/node-server
      - name: Pack
        run: echo "tarball=$(npm pack --quiet | tail -1)" >> "$GITHUB_OUTPUT"
        id: pack
      - name: Test global install
        run: |
          npm install -g ./${{ steps.pack.outputs.tarball }}
          slicc --version
      - name: Test npx
        run: npx --yes "sliccy@file:./${{ steps.pack.outputs.tarball }}" --version

  # Wait for any in-progress release before allowing merge queue to land.
  # Only runs on merge_group events; skipped (= passing) for PRs.
  release-gate:
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      actions: read
    steps:
      - name: Wait for active release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          while true; do
            ACTIVE=$(gh api "repos/${{ github.repository }}/actions/workflows/release.yml/runs?status=in_progress&per_page=1" --jq '.total_count')
            QUEUED=$(gh api "repos/${{ github.repository }}/actions/workflows/release.yml/runs?status=queued&per_page=1" --jq '.total_count')
            if [ "$ACTIVE" = "0" ] && [ "$QUEUED" = "0" ]; then
              echo "No release in progress, proceeding"
              break
            fi
            echo "Release running (active=$ACTIVE queued=$QUEUED), waiting 30s..."
            sleep 30
          done

  # Summary job — the single required status check for branch protection
  ci:
    if: always()
    needs:
      [
        changes,
        lint,
        linear-history,
        node-matrix-tests,
        webapp,
        speech-e2e,
        node-server,
        chrome-extension,
        cloudflare-worker,
        cloud-core,
        shared,
        webcomponents,
        spoon,
        global-install,
        swift-launcher,
        swift-server,
        swift-optel,
        ios-app,
        release-gate,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more jobs failed or were cancelled"
            exit 1
          fi
