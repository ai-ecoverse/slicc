name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run build:extension
      - name: E2E preview tests
        run: |
          npx playwright install chromium
          npm run test:e2e
      - name: Check CLAUDE.md size
        run: |
          chars=$(wc -c < CLAUDE.md)
          echo "CLAUDE.md is $chars characters"
          if [ "$chars" -gt 30000 ]; then
            echo "::error::CLAUDE.md exceeds 30,000 character limit ($chars chars). Please condense it."
            exit 1
          fi
      - name: Build Sliccstart
        run: |
          cd packages/swift-launcher
          chmod +x build-app.sh
          ./build-app.sh
