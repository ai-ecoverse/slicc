name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [automation/planning-artifact-cleanup]
  merge_group:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      webapp: ${{ steps.filter.outputs.webapp }}
      vfs-root: ${{ steps.filter.outputs.vfs-root }}
      assets: ${{ steps.filter.outputs.assets }}
      cloud-core: ${{ steps.filter.outputs.cloud-core }}
      node-server: ${{ steps.filter.outputs.node-server }}
      shared: ${{ steps.filter.outputs.shared }}
      webcomponents: ${{ steps.filter.outputs.webcomponents }}
      spoon: ${{ steps.filter.outputs.spoon }}
      extension: ${{ steps.filter.outputs.extension }}
      cloudflare-worker: ${{ steps.filter.outputs.cloudflare-worker }}
      cherry: ${{ steps.filter.outputs.cherry }}
      dev-tools: ${{ steps.filter.outputs.dev-tools }}
      swift-server: ${{ steps.filter.outputs.swift-server }}
      swift-optel: ${{ steps.filter.outputs.swift-optel }}
      swift-launcher: ${{ steps.filter.outputs.swift-launcher }}
      ios-app: ${{ steps.filter.outputs.ios-app }}
      swift-config: ${{ steps.filter.outputs.swift-config }}
      root-config: ${{ steps.filter.outputs.root-config }}
      speech: ${{ steps.filter.outputs.speech }}
      is-queue-leader: ${{ steps.queue-position.outputs.leader }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            webapp:
              - 'packages/webapp/**'
            vfs-root:
              - 'packages/vfs-root/**'
            assets:
              - 'packages/assets/**'
            cloud-core:
              - 'packages/cloud-core/**'
            node-server:
              - 'packages/node-server/**'
            shared:
              - 'packages/shared-ts/**'
            webcomponents:
              - 'packages/webcomponents/**'
            spoon:
              - 'packages/spoon/**'
            extension:
              - 'packages/chrome-extension/**'
            cloudflare-worker:
              - 'packages/cloudflare-worker/**'
            cherry:
              - 'packages/cherry/**'
            dev-tools:
              - 'packages/dev-tools/**'
            swift-server:
              - 'packages/swift-server/**'
            swift-optel:
              - 'packages/swift-optel/**'
            swift-launcher:
              - 'packages/swift-launcher/**'
            ios-app:
              - 'packages/ios-app/**'
            swift-config:
              - '.swiftlint.yml'
              # Swift coverage floors + the gate script live outside the
              # swift packages, so a threshold-only ratchet PR must still
              # trigger the swift coverage jobs that consume them.
              - 'coverage-thresholds.json'
              - 'packages/dev-tools/tools/swift-coverage-check.sh'
            root-config:
              - 'package.json'
              - 'package-lock.json'
              - 'patches/**'
              - 'tsconfig*.json'
              - 'vitest*.config.*'
              - '.github/workflows/ci.yml'
              # Coverage floors + the TS gate tooling gate every package
              # job; a threshold-only ratchet PR must exercise them.
              - 'coverage-thresholds.json'
              - 'packages/dev-tools/tools/coverage-gate.mjs'
              - 'packages/dev-tools/tools/coverage-ratchet-lib.mjs'
            # Real-model `say -o` WAV (gated; see `speech-e2e` job).
            # Trigger on the synthesis engine, the `say` command, the
            # page-side panel RPC handlers that bridge it out of the
            # worker, and the terminal seam the test drives.
            speech:
              - 'packages/webapp/src/speech/**'
              - 'packages/webapp/src/shell/supplemental-commands/say-command.ts'
              - 'packages/webapp/src/ui/panel-rpc-handlers.ts'
              - 'packages/webapp/src/kernel/panel-rpc.ts'
              - 'packages/webapp/src/kernel/remote-terminal-view.ts'
              - 'packages/webapp/src/kernel/terminal-session-client.ts'
              - 'packages/webapp/src/ui/wc/wc-live.ts'
              - 'packages/webapp/tests/e2e/speech-roundtrip.test.ts'
              - 'packages/webapp/tests/e2e/helpers.ts'
              - 'packages/webapp/tests/e2e/playwright.config.ts'

      - name: Check merge queue position
        id: queue-position
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "merge_group" ]; then
            echo "leader=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Extract PR number from merge queue branch name (gh-readonly-queue/main/pr-NNN-sha)
          PR_NUMBER=$(echo "${{ github.event.merge_group.head_ref }}" | grep -oP 'pr-\K[0-9]+')
          if [ -z "$PR_NUMBER" ]; then
            echo "leader=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          POSITION=$(gh api graphql -f query='{ repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") { mergeQueue(branch: "main") { entries(first: 20) { nodes { position pullRequest { number } } } } } }' --jq ".data.repository.mergeQueue.entries.nodes[] | select(.pullRequest.number == $PR_NUMBER) | .position" 2>/dev/null || echo "")
          if [ "$POSITION" = "1" ] || [ -z "$POSITION" ]; then
            echo "leader=true" >> "$GITHUB_OUTPUT"
            echo "Queue position: $POSITION (leader)"
          else
            echo "leader=false" >> "$GITHUB_OUTPUT"
            echo "Queue position: $POSITION (skipping expensive jobs)"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so the function-size + cognitive-complexity boy-scout
          # gate (check-touched-exemptions.mjs) can resolve merge-base
          # against $GITHUB_BASE_REF.
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Lint (biome + prettier + CLAUDE.md sizes + tessl skill lint)
        run: npm run lint:ci
      - name: Function-size + cognitive-complexity debt boy-scout gate
        # Fail when this PR touches a file that is still on either of the
        # biome.json complexity debt lists (function-size or cognitive-
        # complexity) without removing its override entry. Skips
        # automatically on merge_group / push.
        run: node packages/dev-tools/tools/check-touched-exemptions.mjs
      - name: Check Chrome Web Store manifest justifications
        # Fail if the extension manifest gains/drops a permission without a
        # matching reviewer justification in docs/chrome-web-store-submission.md
        # (or vice-versa). Keeps the CWS submission pack in sync with the
        # shipped permission set.
        run: bash packages/dev-tools/tools/check-manifest-justifications.sh
      - name: Dead code detection (knip)
        # Hard-fail on unused files, missing/unlisted dependencies,
        # unresolved imports, duplicate exports, and unused binaries.
        # Unused individual exports/types are NOT enforced here — they
        # often represent intentional public API surface and are
        # tracked separately via 'npm run deadcode:full'.
        # Selector flags live in package.json so the CI gate cannot
        # silently diverge from the documented local command.
        run: npm run deadcode -- --no-progress --reporter compact
      - name: Dead code detection — production-mode files (knip)
        # Hard-fail on production-unreachable ("test-only") dead files
        # that the default gate above misses: knip's default mode treats
        # test files as entry points, so a module imported only by a
        # test (and otherwise wired to nothing) looks reachable. Running
        # knip with --production drops test entries, surfacing dead
        # files that exist solely to satisfy stale tests (precedent:
        # api-key-dialog.ts, issue #1018). Files-only by design —
        # individual unused exports remain intentional API surface and
        # are not enforced here. Selector flags live in package.json so
        # the CI gate cannot silently diverge from the documented local
        # command.
        run: npm run deadcode:production-files -- --no-progress --reporter compact

  # The merge queue lands PRs with a linear history (rebase, no merge
  # commits). A branch that merged `main` in — instead of rebasing onto it —
  # is rejected late, after the PR has already gone green and burned a full
  # CI run. Catch it here, at PR time. PR-only: in the merge_group the history
  # is linear by construction, so this is skipped (= passing).
  linear-history:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so base..head can be walked for merge commits.
          fetch-depth: 0
      - name: Check linear history
        run: |
          bash packages/dev-tools/tools/check-linear-history.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

  # Lightweight test matrix that re-runs the TypeScript test suites across
  # tested Node majors (currently 24, 25, and 26). The package engines
  # field is `>=22.13.0`, so any one-version pin in the heavier per-package
  # jobs misses regressions that only surface on newer runtimes (e.g. jsdom
  # + Node >= 25 quirks around vi.unstubAllGlobals + localStorage). Build/E2E
  # stay on a single Node version in the per-package jobs to keep CI time
  # bounded.
  node-matrix-tests:
    needs: changes
    if: >-
      needs.changes.outputs.webapp == 'true' ||
      needs.changes.outputs.vfs-root == 'true' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.cloud-core == 'true' ||
      needs.changes.outputs.node-server == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.cloudflare-worker == 'true' ||
      needs.changes.outputs.cherry == 'true' ||
      needs.changes.outputs.dev-tools == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['24', '25', '26']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Vitest (all projects, no coverage thresholds)
        run: npm run test
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
          SLICC_CDP_LAUNCH_TIMEOUT_MS: '60000'

  webapp:
    needs: changes
    if: >-
      needs.changes.outputs.webapp == 'true' ||
      needs.changes.outputs.vfs-root == 'true' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.spoon == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: tsc --noEmit -p tsconfig.json
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:webapp
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-webapp
          path: coverage/
          if-no-files-found: ignore
      - name: Build
        run: npm run build -w @slicc/webapp
      - name: Check bundle for Node-only APIs
        run: |
          # Scan browser bundles for Node-only APIs that should never be bundled.
          # Excluded files:
          #   - pyodide:        legitimately contains Node references in dead branches
          #     (its IN_NODE detection gates the Node-only paths at runtime).
          #   - kernel-worker:  bundles pi-coding-agent's compaction module, which has
          #     the same IN_NODE detection pattern. The worker is a Web Worker
          #     context where IN_NODE is false; the Node branches are dead code at
          #     load time. Manually verified — see Phase 2 work.
          #   - py-realm-worker: hosts Pyodide, so by definition pulls the same
          #     IN_NODE-gated dead branches as pyodide-* itself.
          #   - transformers.web: @huggingface/transformers (the speech stack's
          #     whisper/kokoro engines) carries the same environment-gated Node
          #     compat branches (fileURLToPath etc.); in the browser its
          #     IS_NODE_ENV detection keeps them dead at load time.
          FORBIDDEN='fileURLToPath|require\("(fs|path|crypto|child_process|os|net|tls|http2|dgram|cluster|readline|repl|vm|v8|perf_hooks|worker_threads|inspector)"\)'
          MATCHES=$(grep -rlE "$FORBIDDEN" dist/ui/assets/*.js 2>/dev/null | grep -vE 'pyodide|kernel-worker|py-realm-worker|transformers\.web' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Node-only APIs found in browser bundle:"
            for f in $MATCHES; do
              echo "  $f:"
              grep -nE "$FORBIDDEN" "$f" | head -5
            done
            exit 1
          fi
          echo "✓ No Node-only APIs found in webapp bundle"
      - name: Check dev deps for Node-only APIs
        working-directory: packages/webapp
        run: |
          # Force Vite to pre-bundle dependencies (same as dev server startup)
          npx vite optimize --force
          # Scan optimized deps for Node-only APIs that crash in the browser
          FORBIDDEN='fileURLToPath|require\("(fs|path|crypto|child_process|os|net|tls|http2|dgram|cluster|readline|repl|vm|v8|perf_hooks|worker_threads|inspector)"\)'
          # transformers.web: environment-gated Node compat branches, dead in
          # the browser (same justification as the bundle scans above).
          MATCHES=$(grep -rlE "$FORBIDDEN" ../../node_modules/.vite/deps/*.js 2>/dev/null | grep -vE 'pyodide|transformers\.web' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Node-only APIs found in Vite dev-optimized deps:"
            for f in $MATCHES; do
              echo "  $f:"
              grep -nE "$FORBIDDEN" "$f" | head -5
            done
            exit 1
          fi
          echo "✓ No Node-only APIs found in dev-optimized deps"
      - name: Build @slicc/shared-ts (node-server runtime dependency)
        run: npm run build -w @slicc/shared-ts
      - name: Build node-server (E2E dependency)
        run: npm run build -w @slicc/node-server
      - name: E2E tests
        run: |
          npx playwright install chromium
          npm run test:e2e

  # Real `say -o` Kokoro synthesis through the worker→page→worker
  # synthesize-to-wav bridge, validating the produced WAV file. Split
  # from `webapp` (and gated on the `speech` path filter) because the
  # Kokoro-82M weights + onnxruntime runtime take a few minutes to
  # stage on a cold OPFS. The test itself is gated behind
  # `RUN_REAL_SPEECH_E2E=1` so it stays skipped on every other job
  # (including the main `webapp` E2E run).
  speech-e2e:
    needs: changes
    if: needs.changes.outputs.speech == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build @slicc/shared-ts (node-server runtime dependency)
        run: npm run build -w @slicc/shared-ts
      - name: Build node-server (E2E dependency — fetch-proxy + serve)
        run: npm run build -w @slicc/node-server
      - name: Build webapp
        run: npm run build -w @slicc/webapp
      - name: Install Chromium (with system deps)
        run: npx playwright install --with-deps chromium
      - name: E2E say -o WAV (real Kokoro)
        run: npm run test:e2e -- speech-roundtrip
        env:
          RUN_REAL_SPEECH_E2E: '1'
          NODE_OPTIONS: '--max-old-space-size=6144'
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-speech
          # Playwright writes its outputs under packages/webapp/* because
          # the config's `testDir` resolves there (see
          # `packages/webapp/tests/e2e/playwright.config.ts`).
          path: |
            packages/webapp/playwright-report/
            packages/webapp/test-results/
            packages/webapp/tests/e2e/test-results/
          if-no-files-found: ignore

  node-server:
    needs: changes
    if: >-
      needs.changes.outputs.cloud-core == 'true' ||
      needs.changes.outputs.node-server == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.spoon == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: tsc --noEmit -p tsconfig.cli.json
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:node-server
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-node-server
          path: coverage/
          if-no-files-found: ignore
      - name: Build @slicc/shared-ts (runtime dependency)
        run: npm run build -w @slicc/shared-ts
      - name: Build
        run: npm run build -w @slicc/node-server

  chrome-extension:
    needs: changes
    if: >-
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.webapp == 'true' ||
      needs.changes.outputs.vfs-root == 'true' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.spoon == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:chrome-extension
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-chrome-extension
          path: coverage/
          if-no-files-found: ignore
      - name: Build webapp (dependency)
        run: npm run build -w @slicc/webapp
      - name: Build extension
        run: npm run build -w @slicc/chrome-extension
      - name: Check bundle for forbidden CDN URL literals (MV3 RHC guard)
        run: bash packages/dev-tools/tools/check-extension-rhc.sh
      - name: Check bundle for Node-only APIs
        run: |
          # Scan extension bundles for Node-only APIs that should never be bundled.
          # Exclude pyodide files which legitimately contain Node references.
          FORBIDDEN='fileURLToPath|require\("(fs|path|crypto|child_process|os|net|tls|http2|dgram|cluster|readline|repl|vm|v8|perf_hooks|worker_threads|inspector)"\)'
          # Same exclusions as the webapp scan (see comment there).
          MATCHES=$(grep -rlE "$FORBIDDEN" dist/extension/assets/*.js 2>/dev/null | grep -vE 'pyodide|kernel-worker|py-realm-worker|transformers\.web' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Node-only APIs found in extension bundle:"
            for f in $MATCHES; do
              echo "  $f:"
              grep -nE "$FORBIDDEN" "$f" | head -5
            done
            exit 1
          fi
          echo "✓ No Node-only APIs found in extension bundle"
      - name: Check dev deps for Node-only APIs
        working-directory: packages/chrome-extension
        run: |
          # Force Vite to pre-bundle dependencies (same as dev server startup)
          npx vite optimize --force
          # Scan optimized deps for Node-only APIs that crash in the browser
          FORBIDDEN='fileURLToPath|require\("(fs|path|crypto|child_process|os|net|tls|http2|dgram|cluster|readline|repl|vm|v8|perf_hooks|worker_threads|inspector)"\)'
          # transformers.web: environment-gated Node compat branches, dead in
          # the browser (same justification as the bundle scans above).
          MATCHES=$(grep -rlE "$FORBIDDEN" ../../node_modules/.vite/deps/*.js 2>/dev/null | grep -vE 'pyodide|transformers\.web' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Node-only APIs found in Vite dev-optimized deps (extension):"
            for f in $MATCHES; do
              echo "  $f:"
              grep -nE "$FORBIDDEN" "$f" | head -5
            done
            exit 1
          fi
          echo "✓ No Node-only APIs found in dev-optimized deps (extension)"
      - name: Install Chrome for Testing
        run: npx --yes @puppeteer/browsers install chrome@stable
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends xvfb
      - name: Extension smoke test (CDP)
        env:
          SLICC_CI: '1'
        # MV3 extensions with side panels need headed Chrome; xvfb provides
        # the required display on a headless runner. The test is permitted
        # to fail loudly while the ffmpeg-core.js bundling work lands —
        # `continue-on-error: true` keeps CI green during the rollout but
        # surfaces the artifact so the breakage stays visible.
        continue-on-error: true
        run: xvfb-run -a npm run test:extension-smoke -w @slicc/chrome-extension

  cloudflare-worker:
    needs: changes
    if: >-
      needs.changes.outputs.cloud-core == 'true' ||
      needs.changes.outputs.cloudflare-worker == 'true' ||
      needs.changes.outputs.webapp == 'true' ||
      needs.changes.outputs.vfs-root == 'true' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build webapp for worker static assets
        run: npm run build -w @slicc/webapp
      # Hard gate: validate the worker bundle + static-asset constraints the
      # same way the release job does (`wrangler deploy --dry-run`). The
      # staging deploy steps below are `continue-on-error`, so without this a
      # webapp change that pushes a static asset past Cloudflare's 25 MiB
      # per-file cap would pass the PR and only break in release. Runs with no
      # secrets or network writes.
      - name: Validate worker bundle and asset sizes (dry-run)
        run: npm run build -w @slicc/cloudflare-worker
      - name: Typecheck
        run: tsc --noEmit -p tsconfig.worker.json
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:cloudflare-worker
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-cloudflare-worker
          path: coverage/
          if-no-files-found: ignore

      # Deploy to staging on PRs (not forks) and pushes to main.
      #
      # The staging Worker (slicc-tray-hub-staging) has Worker Versions enabled.
      # wrangler-action runs `wrangler secret bulk` BEFORE the `command:`
      # whenever `secrets:` is set, so a single deploy+secrets step uploads
      # secrets first. When the Worker's latest version is not the deployed one
      # (a pending/undeployed version exists), `secret bulk` fails with
      # Cloudflare error 10215 ("deploy the latest version first, then modify
      # secrets"). Each attempt is therefore split into two invocations:
      # Step A deploys the latest version (no `secrets:`), clearing the
      # pending-version state and emitting the `deployment-url`; Step B then
      # uploads secrets, which now succeeds because the latest version is
      # deployed. The action has no channel to feed values to
      # `versions secret bulk` (the `secrets:` input is hard-wired to
      # `secret bulk`), so this "deploy first, then modify secrets" workaround
      # is used instead of the versions secret API. `environment: staging` is
      # required on both so wrangler targets slicc-tray-hub-staging, not the
      # production Worker.
      - name: Deploy staging worker (attempt 1)
        id: deploy_attempt_1
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
          github.event_name == 'push'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
      - name: Upload staging secrets (attempt 1)
        id: deploy_attempt_1_secrets
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
          github.event_name == 'push'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
          secrets: |
            CLOUDFLARE_TURN_API_TOKEN
            GITHUB_CLIENT_SECRET
            E2B_API_KEY
        env:
          CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET_STAGING }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
      - name: Wait before staging deploy retry 2
        if: steps.deploy_attempt_1.outcome == 'failure' || steps.deploy_attempt_1_secrets.outcome == 'failure'
        run: sleep 20
      - name: Deploy staging worker (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure' || steps.deploy_attempt_1_secrets.outcome == 'failure'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
      - name: Upload staging secrets (attempt 2)
        id: deploy_attempt_2_secrets
        if: steps.deploy_attempt_1.outcome == 'failure' || steps.deploy_attempt_1_secrets.outcome == 'failure'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
          secrets: |
            CLOUDFLARE_TURN_API_TOKEN
            GITHUB_CLIENT_SECRET
            E2B_API_KEY
        env:
          CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET_STAGING }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
      - name: Wait before staging deploy retry 3
        if: (steps.deploy_attempt_1.outcome == 'failure' || steps.deploy_attempt_1_secrets.outcome == 'failure') && (steps.deploy_attempt_2.outcome == 'failure' || steps.deploy_attempt_2_secrets.outcome == 'failure')
        run: sleep 40
      - name: Deploy staging worker (attempt 3)
        id: deploy_attempt_3
        if: (steps.deploy_attempt_1.outcome == 'failure' || steps.deploy_attempt_1_secrets.outcome == 'failure') && (steps.deploy_attempt_2.outcome == 'failure' || steps.deploy_attempt_2_secrets.outcome == 'failure')
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
      - name: Upload staging secrets (attempt 3)
        id: deploy_attempt_3_secrets
        if: (steps.deploy_attempt_1.outcome == 'failure' || steps.deploy_attempt_1_secrets.outcome == 'failure') && (steps.deploy_attempt_2.outcome == 'failure' || steps.deploy_attempt_2_secrets.outcome == 'failure')
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
          secrets: |
            CLOUDFLARE_TURN_API_TOKEN
            GITHUB_CLIENT_SECRET
            E2B_API_KEY
        env:
          CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET_STAGING }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
      - name: Finalize staging deploy
        id: deploy
        if: (steps.deploy_attempt_1.outcome == 'success' && steps.deploy_attempt_1_secrets.outcome == 'success') || (steps.deploy_attempt_2.outcome == 'success' && steps.deploy_attempt_2_secrets.outcome == 'success') || (steps.deploy_attempt_3.outcome == 'success' && steps.deploy_attempt_3_secrets.outcome == 'success')
        env:
          DEPLOY_A_1: ${{ steps.deploy_attempt_1.outcome }}
          DEPLOY_B_1: ${{ steps.deploy_attempt_1_secrets.outcome }}
          DEPLOYMENT_URL_1: ${{ steps.deploy_attempt_1.outputs.deployment-url }}
          DEPLOY_A_2: ${{ steps.deploy_attempt_2.outcome }}
          DEPLOY_B_2: ${{ steps.deploy_attempt_2_secrets.outcome }}
          DEPLOYMENT_URL_2: ${{ steps.deploy_attempt_2.outputs.deployment-url }}
          DEPLOY_A_3: ${{ steps.deploy_attempt_3.outcome }}
          DEPLOY_B_3: ${{ steps.deploy_attempt_3_secrets.outcome }}
          DEPLOYMENT_URL_3: ${{ steps.deploy_attempt_3.outputs.deployment-url }}
        run: |
          DEPLOYMENT_URL=""
          if [ "$DEPLOY_A_1" = "success" ] && [ "$DEPLOY_B_1" = "success" ]; then DEPLOYMENT_URL="${DEPLOYMENT_URL_1:-}"; fi
          if [ -z "$DEPLOYMENT_URL" ] && [ "$DEPLOY_A_2" = "success" ] && [ "$DEPLOY_B_2" = "success" ]; then DEPLOYMENT_URL="${DEPLOYMENT_URL_2:-}"; fi
          if [ -z "$DEPLOYMENT_URL" ] && [ "$DEPLOY_A_3" = "success" ] && [ "$DEPLOY_B_3" = "success" ]; then DEPLOYMENT_URL="${DEPLOYMENT_URL_3:-}"; fi
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "::error::Staging deploy failed after 3 attempts"
            exit 1
          fi
          echo "deployment-url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
      - name: Smoke test staging
        if: steps.deploy.outcome == 'success'
        env:
          WORKER_BASE_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if npx vitest run --project cloudflare-worker packages/cloudflare-worker/tests/deployed.test.ts; then
              exit 0
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "Deployed smoke test failed after ${attempt} attempts"
              exit 1
            fi
            echo "Smoke test attempt ${attempt} failed; waiting for propagation..."
            sleep 15
          done

      # Deploy the dedicated preview worker (no secrets, no static assets).
      # Runs after the main worker so the TRAY_HUB DO (referenced via
      # script_name) is up to date.
      - name: Deploy staging preview worker
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging --config wrangler-preview.jsonc

  cloud-core:
    needs: changes
    if: >-
      needs.changes.outputs.cloud-core == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: tsc --noEmit -p packages/cloud-core/tsconfig.json
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:cloud-core
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-cloud-core
          path: coverage/
          if-no-files-found: ignore
      - name: Build
        run: npm run build -w @slicc/cloud-core

  shared:
