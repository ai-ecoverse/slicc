      - name: Install Chromium (browser tests)
        run: npx playwright install chromium
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:webcomponents
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-webcomponents
          path: packages/webcomponents/coverage/
          if-no-files-found: ignore
      - name: Build
        run: npm run build -w @slicc/webcomponents

  spoon:
    needs: changes
    if: >-
      needs.changes.outputs.spoon == 'true' ||
      needs.changes.outputs.root-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck -w @ai-ecoverse/spoon
      # The launcher is a real custom element — functional tests run in real
      # Chromium via the Playwright provider (mirrors @slicc/webcomponents).
      - name: Install Chromium (browser tests)
        run: npx playwright install chromium
      - name: Test (with coverage threshold gate)
        run: npm run test:coverage:spoon
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-spoon
          path: packages/spoon/coverage/
          if-no-files-found: ignore
      - name: Build
