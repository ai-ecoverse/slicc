name: Worker Production

on:
  push:
    branches: [main]
    paths:
      - 'src/worker/**'
      - 'wrangler.jsonc'
      - '.github/workflows/worker-production.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-production:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ vars.WORKER_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify worker unit tests before deploy
        run: npx vitest run src/worker/index.test.ts

      - name: Deploy production worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler deploy

      - name: Run deployed smoke test against production
        env:
          WORKER_BASE_URL: ${{ vars.WORKER_BASE_URL }}
        run: npx vitest run src/worker/deployed.test.ts