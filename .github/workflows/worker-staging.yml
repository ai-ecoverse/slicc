name: Worker Staging Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/cloudflare-worker/**'
      - 'packages/cloud-core/**'
      - 'packages/webapp/src/providers/**'
      - 'packages/webapp/providers/**'

# Serialize across ALL PRs: this job mutates two shared singletons — the
# `slicc-staging` e2b template alias (build overwrites it) and the
# `slicc-tray-hub-staging` worker (deploy overwrites it). Without this, two
# concurrent PRs can interleave (PR A builds → PR B overwrites → PR A's verify
# boots PR B's template), giving PR A a false pass against PR B's artifacts.
# cancel-in-progress: false → queue rather than cancel, so an in-flight deploy
# never gets killed half-way. Unrelated CI (the ci.yml jobs) still runs in
# parallel; only this workflow's runs serialize.
concurrency:
  group: worker-staging-e2b-slicc-staging
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy-staging:
    name: Deploy staging + smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Register a GitHub Deployment for the `staging` environment so the rollout
      # surfaces in the PR's deployments timeline and the repo Environments view
      # instead of a one-off PR comment. `required_contexts: []` skips the
      # commit-status gate (this workflow IS the gate). The success status below
      # relies on the default `auto_inactive`, which retires the previous staging
      # deployment so only the current rollout shows as active. This is a
      # persistent shared environment, so it is deliberately NOT marked
      # `transient_environment` — that flag exempts prior deployments from
      # auto-inactivation, leaving stale staging entries active. The id is
      # consumed by the success/failure status steps below.
      - name: Create GitHub deployment
        id: gh_deployment
        uses: actions/github-script@v9
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: 'staging',
              auto_merge: false,
              required_contexts: [],
              production_environment: false,
              description: 'Cloudflare staging worker deploy',
            });
            core.setOutput('deployment_id', deployment.data.id);
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Deploying staging worker',
            });

      - name: Build webapp for worker static assets
        run: npm run build -w @slicc/webapp

      - name: Verify worker unit tests before deploy
        run: npx vitest run --project cloudflare-worker packages/cloudflare-worker/tests/index.test.ts

      - name: Build dependencies for e2b template
        run: npm run build -w @slicc/shared-ts && npm run build -w @slicc/cloud-core && npm run build -w @slicc/node-server

      # Build + verify under the isolated `slicc-staging` alias, NEVER the prod
      # `slicc` alias. This job runs on every PR touching cloudflare-worker/ or
      # cloud-core/, and e2b has no build-without-deploy — `Template.build`
      # publishes the alias it builds. Defaulting to `slicc` (template.ts's
      # default) would republish the PRODUCTION template from un-merged PR
      # branch code, and `Sandbox.create('slicc')` in prod would pick it up
      # immediately. A fixed `slicc-staging` alias keeps the per-PR "template
      # builds & boots" signal while leaving prod untouched; it's overwritten by
      # each staging run (no per-PR template sprawl). Prod `slicc` is built only
      # by release.yml (on merge) and worker.yml (manual prod deploy).
      - name: Build and push e2b template (isolated staging alias)
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          SLICC_E2B_TEMPLATE_NAME: slicc-staging
        run: bash packages/dev-tools/e2b-template/scripts/build-template.sh

      - name: Verify template boots (isolated staging alias)
        env:
          SLICC_TEST_E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          SLICC_E2B_TEMPLATE_NAME: slicc-staging
        run: bash packages/dev-tools/e2b-template/scripts/verify-template.sh

      # The staging Worker (slicc-tray-hub-staging) has Worker Versions enabled.
      # wrangler-action runs `wrangler secret bulk` BEFORE the `command:`
      # whenever `secrets:` is set, so a single deploy+secrets step uploads
      # secrets first. When the Worker's latest version is not the deployed one
      # (a pending/undeployed version exists), `secret bulk` fails with
      # Cloudflare error 10215 ("deploy the latest version first, then modify
      # secrets"). Each attempt is therefore split into two invocations:
      # Step A deploys the latest version (no `secrets:`), clearing the
      # pending-version state and emitting the `deployment-url`; Step B then
      # redeploys with secrets, which now succeeds because the latest version
      # is deployed. The action has no channel to feed values to
      # `versions secret bulk` (the `secrets:` input is hard-wired to
      # `secret bulk`), so this "deploy first, then modify secrets" workaround
      # is used instead of the versions secret API. `environment: staging` is
      # required on both so wrangler targets slicc-tray-hub-staging, not the
      # production Worker (slicc-tray-hub).
      - name: Deploy staging worker (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging

      - name: Upload staging secrets (attempt 1)
        id: deploy_attempt_1_secrets
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
          secrets: |
            CLOUDFLARE_TURN_API_TOKEN
            GITHUB_CLIENT_SECRET
            E2B_API_KEY
        env:
          CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET_STAGING }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}

      - name: Wait before staging deploy retry 2
        if: steps.deploy_attempt_1.outcome == 'failure' || steps.deploy_attempt_1_secrets.outcome == 'failure'
        run: sleep 20

      - name: Deploy staging worker (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure' || steps.deploy_attempt_1_secrets.outcome == 'failure'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging

      - name: Upload staging secrets (attempt 2)
        id: deploy_attempt_2_secrets
        if: steps.deploy_attempt_1.outcome == 'failure' || steps.deploy_attempt_1_secrets.outcome == 'failure'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cloudflare-worker
          environment: staging
          command: deploy --env staging
          secrets: |
            CLOUDFLARE_TURN_API_TOKEN
            GITHUB_CLIENT_SECRET
            E2B_API_KEY
        env:
          CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET_STAGING }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}

      - name: Finalize staging deploy metadata
        id: deploy
        env:
          DEPLOYMENT_URL_1: ${{ steps.deploy_attempt_1.outputs.deployment-url }}
          DEPLOYMENT_URL_2: ${{ steps.deploy_attempt_2.outputs.deployment-url }}
          DEPLOY_A_1: ${{ steps.deploy_attempt_1.outcome }}
          DEPLOY_B_1: ${{ steps.deploy_attempt_1_secrets.outcome }}
          DEPLOY_A_2: ${{ steps.deploy_attempt_2.outcome }}
          DEPLOY_B_2: ${{ steps.deploy_attempt_2_secrets.outcome }}
        run: |
          DEPLOYMENT_URL=""
          SUCCESSFUL_ATTEMPT=
          if [ "$DEPLOY_A_1" = "success" ] && [ "$DEPLOY_B_1" = "success" ]; then
            DEPLOYMENT_URL="${DEPLOYMENT_URL_1:-}"
            SUCCESSFUL_ATTEMPT=1
          fi
          if [ -z "$DEPLOYMENT_URL" ] && [ "$DEPLOY_A_2" = "success" ] && [ "$DEPLOY_B_2" = "success" ]; then
            DEPLOYMENT_URL="${DEPLOYMENT_URL_2:-}"
            SUCCESSFUL_ATTEMPT=2
          fi
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Cloudflare staging deploy failed after 2 attempts"
            echo "Attempt outcomes: 1=(deploy=${DEPLOY_A_1:-not-run}, secrets=${DEPLOY_B_1:-not-run}), 2=(deploy=${DEPLOY_A_2:-not-run}, secrets=${DEPLOY_B_2:-not-run})"
            exit 1
          fi
          echo "Cloudflare staging deploy succeeded on attempt ${SUCCESSFUL_ATTEMPT}: ${DEPLOYMENT_URL}"
          echo "deployment-url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"

      - name: Run deployed smoke test against staging
        env:
          WORKER_BASE_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          if [ -z "$WORKER_BASE_URL" ]; then
            echo "Missing deployment URL from cloudflare/wrangler-action output"
            exit 1
          fi
          for attempt in 1 2 3 4 5 6; do
            if npx vitest run --project cloudflare-worker packages/cloudflare-worker/tests/deployed.test.ts; then
              exit 0
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "Deployed smoke test failed after ${attempt} attempts"
              exit 1
            fi
            echo "Deployed smoke test failed on attempt ${attempt}; waiting for workers.dev propagation before retrying..."
            sleep 15
          done

      - name: Mark deployment successful
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: '${{ steps.gh_deployment.outputs.deployment_id }}',
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.deployment-url }}',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Staging worker deployed; smoke tests passed',
            });

      - name: Mark deployment failed
        if: failure() && steps.gh_deployment.outputs.deployment_id != ''
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: '${{ steps.gh_deployment.outputs.deployment_id }}',
              state: 'failure',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Staging worker deploy failed',
            });
