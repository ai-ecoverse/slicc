name: Storybook Screenshots

# On PRs touching packages/webcomponents, capture light+dark Storybook screenshots
# for stories whose source files changed, upload them to the Cloudflare R2 bucket
# `slicc-pr-screenshots` (or to a workflow artifact on fork PRs where secrets are
# unavailable), and post/update a single sticky PR comment with the images inline.
#
# Required repository secrets (host PRs only — fork PRs gracefully degrade):
#   CLOUDFLARE_API_TOKEN  R2 token with Object Read+Write on `slicc-pr-screenshots`.
# Required repository variables (with sensible defaults if unset):
#   CLOUDFLARE_ACCOUNT_ID  defaults to 155ec15a52a18a14801e04b019da5e5a (AEM Demo).
#   R2_PUBLIC_BASE_URL     defaults to https://pub-e4170b327f03406f9831a6f393b96e05.r2.dev
#   R2_BUCKET              defaults to slicc-pr-screenshots
#
# wrangler is invoked with `--remote` and `CLOUDFLARE_ACCOUNT_ID` exported so the
# account is unambiguous in non-interactive runs.

on:
  pull_request:
    branches: [main]

concurrency:
  group: storybook-screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      webcomponents: ${{ steps.filter.outputs.webcomponents }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            webcomponents:
              - 'packages/webcomponents/**'

  screenshots:
    needs: changes
    if: needs.changes.outputs.webcomponents == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || '155ec15a52a18a14801e04b019da5e5a' }}
      R2_BUCKET: ${{ vars.R2_BUCKET || 'slicc-pr-screenshots' }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL || 'https://pub-e4170b327f03406f9831a6f393b96e05.r2.dev' }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Compute changed files (PR diff)
        id: diff
        # Use `git diff` against the PR base SHA rather than `gh pr diff`, which
        # caps at 20000 lines and errors out on large PRs. The `fetch-depth: 0`
        # checkout above makes the base ref locally available; on the rare case
        # it isn't, we degrade to an empty list (zero affected stories) rather
        # than failing the job.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          mkdir -p .storybook-screenshots
          OUT=.storybook-screenshots/changed-files.txt
          : > "$OUT"
          if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git diff --name-only "${BASE_SHA}...HEAD" > "$OUT"
          else
            echo "::warning::Base ref ${BASE_SHA} not available; treating as zero affected stories."
          fi
          echo "Changed files:"
          cat "$OUT"

      - name: Install Chromium (Storybook capture)
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npm run build-storybook -w @slicc/webcomponents

      - name: Capture screenshots of affected stories
        run: |
          set -euo pipefail
          node packages/dev-tools/tools/storybook-affected-screenshots.mjs \
            --changed-files=.storybook-screenshots/changed-files.txt \
            --storybook-static=packages/webcomponents/storybook-static \
            --out=.storybook-screenshots/out

      - name: Check upload mode
        id: mode
        env:
          R2_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "${R2_TOKEN:-}" ]; then
            echo "mode=r2" >> "$GITHUB_OUTPUT"
          else
            echo "mode=artifact" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not available (likely a fork PR); falling back to artifact upload."
          fi

      - name: Upload screenshots to Cloudflare R2
        id: r2_upload
        if: steps.mode.outputs.mode == 'r2'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          MANIFEST=.storybook-screenshots/out/manifest.json
          if [ ! -s "$MANIFEST" ]; then
            echo "::warning::No manifest produced by capture script; skipping upload."
            exit 0
          fi
          export PREFIX="pr-${PR_NUMBER}/${HEAD_SHA}"
          export R2_BUCKET

          # Process manifest and upload with content hash deduplication
          node -e '
            const fs = require("fs");
            const { execSync } = require("child_process");
            const m = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            const shots = m.shots || [];

            // Handle zero-shot case: write empty new-uploads.json and exit
            if (shots.length === 0) {
              console.log("No screenshots to upload (zero affected stories).");
              fs.writeFileSync(".storybook-screenshots/new-uploads.json", "[]");
              process.exit(0);
            }

            const uploadData = shots.map(shot => ({
              file: shot.file,
              contentHash: shot.contentHash,
              storyId: shot.storyId,
              theme: shot.theme
            }));
            const prefix = process.env.PREFIX;
            const bucket = process.env.R2_BUCKET;

            let newCount = 0;
            let cachedCount = 0;
            const newUploads = [];

            for (const item of uploadData) {
              const src = `.storybook-screenshots/out/${item.file}`;
              const key = `${prefix}/${item.file}`;
              const hashKey = `hashes/${item.contentHash}`;

              // Check if content hash already exists in R2
              let exists = false;
              try {
                execSync(
                  `npx wrangler r2 object get "${bucket}/${hashKey}" --remote > /dev/null 2>&1`,
                  { stdio: "ignore" }
                );
                exists = true;
              } catch (err) {
                // Object does not exist
                exists = false;
              }

              if (exists) {
                // Content already exists, just create a symlink/reference and bump TTL
                console.log(`  ⊙ ${item.file} (cached, hash ${item.contentHash.slice(0, 8)}…)`);
                // Create a reference that points to the hash-based content
                execSync(
                  `echo "${item.contentHash}" | npx wrangler r2 object put "${bucket}/${key}.ref" --pipe --content-type text/plain --remote`,
                  { stdio: "inherit" }
                );
                cachedCount++;
              } else {
                // New content, upload both the file and the hash reference
                console.log(`  ↑ ${item.file} -> r2://${bucket}/${key} (new, hash ${item.contentHash.slice(0, 8)}…)`);
                execSync(
                  `npx wrangler r2 object put "${bucket}/${key}" --file "${src}" --content-type image/png --remote`,
                  { stdio: "inherit" }
                );
                // Store the content by hash for future deduplication
                execSync(
                  `npx wrangler r2 object put "${bucket}/${hashKey}" --file "${src}" --content-type image/png --remote`,
                  { stdio: "inherit" }
                );
                newCount++;
                newUploads.push(item.file);
              }
            }

            console.log(`\nSummary: ${newCount} new, ${cachedCount} cached (total ${uploadData.length})`);
            fs.writeFileSync(".storybook-screenshots/new-uploads.json", JSON.stringify(newUploads));
          ' "$MANIFEST" || exit 1

      - name: Upload screenshots as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storybook-screenshots-${{ env.HEAD_SHA }}
          path: .storybook-screenshots/out/
          if-no-files-found: ignore

      - name: Post or update sticky PR comment
        # Skip on fork PRs: GITHUB_TOKEN is read-only there and `issues.createComment`
        # would 403. Fork PRs still get the workflow-artifact upload above; same-repo
        # PRs continue to receive the sticky comment.
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          UPLOAD_MODE: ${{ steps.mode.outputs.mode }}
          R2_UPLOAD_OUTCOME: ${{ steps.r2_upload.outcome }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const MARKER = '<!-- storybook-screenshots-comment -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const sha = process.env.HEAD_SHA;
            const shortSha = sha.slice(0, 7);
            const initialMode = process.env.UPLOAD_MODE || 'artifact';
            const r2Outcome = process.env.R2_UPLOAD_OUTCOME || '';
            // If R2 upload was attempted but didn't succeed, fall back to the artifact
            // layout so we don't emit <img> tags pointing at objects that may be
            // missing or partial (continue-on-error keeps the job green).
            const r2Failed = initialMode === 'r2' && r2Outcome !== 'success';
            const mode = r2Failed ? 'artifact' : initialMode;
            const baseUrl = (process.env.R2_PUBLIC_BASE_URL || '').replace(/\/$/, '');
            const bucket = process.env.R2_BUCKET;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const manifestPath = '.storybook-screenshots/out/manifest.json';

            let manifest = null;
            try {
              manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            } catch (err) {
              core.warning(`Could not read manifest at ${manifestPath}: ${err.message}`);
            }

            const shots = manifest && Array.isArray(manifest.shots) ? manifest.shots : [];

            // Load the list of newly uploaded files (only these should be shown in the comment)
            let newUploads = [];
            try {
              const newUploadsPath = '.storybook-screenshots/new-uploads.json';
              if (fs.existsSync(newUploadsPath)) {
                newUploads = JSON.parse(fs.readFileSync(newUploadsPath, 'utf8'));
              } else if (mode === 'artifact') {
                // In artifact mode, all shots are "new" since we don't deduplicate
                newUploads = shots.map(s => s.file);
              }
            } catch (err) {
              core.warning(`Could not read new uploads list: ${err.message}`);
              // Default to showing all shots if we can't determine which are new
              newUploads = shots.map(s => s.file);
            }

            // Filter shots to only include new uploads
            const newShots = shots.filter(s => newUploads.includes(s.file));
            const cachedCount = shots.length - newShots.length;

            // Zero NEW screenshots: avoid the usual comment but note if there were cached ones.
            //   - If a prior sticky comment exists, shrink it to a one-line note
            //     so stale screenshots from an earlier push don't linger.
            //   - Otherwise, skip without creating a comment at all.
            // Applies in both modes (R2 + fork-PR artifact fallback).
            if (newShots.length === 0) {
              const { data: existing } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const prior = existing.find((c) => c.body && c.body.includes(MARKER));
              if (!prior) {
                core.info(
                  'No new screenshots and no prior sticky comment — skipping comment creation.'
                );
                return;
              }
              let body = `${MARKER}\n`;
              if (shots.length === 0) {
                body += `_No affected stories in the latest commit (\`${shortSha}\`)._\n`;
              } else {
                body += `_No new screenshots in the latest commit (\`${shortSha}\`)`;
                body += ` — ${cachedCount} ${cachedCount === 1 ? 'screenshot' : 'screenshots'} matched existing content._\n`;
              }
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
              return;
            }

            // Group flat newShots[] by storyId so each story gets one section with
            // light+dark side-by-side. Order = first-seen storyId in manifest.
            const storiesById = new Map();
            for (const shot of newShots) {
              if (!storiesById.has(shot.storyId)) {
                storiesById.set(shot.storyId, {
                  storyId: shot.storyId,
                  title: shot.title,
                  name: shot.name,
                  area: shot.area,
                  triggeredBy: Array.isArray(shot.triggeredBy) ? shot.triggeredBy : [],
                  byTheme: {},
                });
              }
              storiesById.get(shot.storyId).byTheme[shot.theme] = shot.file;
            }
            const stories = Array.from(storiesById.values());
            const lines = [];
            lines.push(MARKER);
            lines.push('## 📸 Storybook screenshots');
            lines.push('');
            const totalNote = cachedCount > 0
              ? ` (${cachedCount} cached, ${newShots.length} new)`
              : '';
            lines.push(
              `Commit \`${shortSha}\` · ${stories.length} affected ${stories.length === 1 ? 'story' : 'stories'}${totalNote}`
            );
            lines.push('');

            if (mode !== 'r2') {
              if (r2Failed) {
                lines.push(
                  `> ⚠️ R2 upload did not succeed (\`${r2Outcome}\`); using artifact fallback.`
                );
              } else {
                lines.push(
                  `> ℹ️ R2 upload skipped (no \`CLOUDFLARE_API_TOKEN\` available — typical for fork PRs).`
                );
              }
              lines.push(`> Download the PNGs from the [workflow run artifacts](${runUrl}).`);
              lines.push('');
            }

            // shots.length === 0 returned early above; only the >0 path remains.
            for (const story of stories) {
              const title = `${story.title || story.area || ''} — ${story.name || story.storyId}`.replace(
                /^ — /,
                ''
              );
              lines.push(`### ${title.trim()}`);
              lines.push('');
              lines.push(`<sub>\`${story.storyId}\`</sub>`);
              lines.push('');
              if (story.triggeredBy.length > 0) {
                const changed = story.triggeredBy.map((f) => `\`${f}\``).join(', ');
                lines.push(`<sub>changed: ${changed}</sub>`);
                lines.push('');
              }
              if (mode === 'r2') {
                lines.push('| Light | Dark |');
                lines.push('| --- | --- |');
                const cell = (theme) => {
                  const file = story.byTheme[theme];
                  if (!file) return '_(missing)_';
                  const url = `${baseUrl}/pr-${prNumber}/${sha}/${file}`;
                  return `<img src="${url}" alt="${story.storyId} (${theme})" width="360">`;
                };
                lines.push(`| ${cell('light')} | ${cell('dark')} |`);
              } else {
                const files = Object.entries(story.byTheme)
                  .map(([theme, file]) => `\`${file}\` (${theme})`)
                  .join(', ');
                lines.push(`Screenshots in artifact: ${files || '_(none)_'}`);
              }
              lines.push('');
            }

            lines.push('---');
            lines.push(`<sub>Generated by [\`storybook-screenshots\`](${runUrl}) · updates in place on every push.</sub>`);

            const body = lines.join('\n');

            const { data: existing } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const prior = existing.find((c) => c.body && c.body.includes(MARKER));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
