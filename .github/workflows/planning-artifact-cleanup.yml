name: Planning Artifact Cleanup

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: planning-artifact-cleanup-main
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Remove tracked planning artifacts
        id: cleanup
        run: |
          set -euo pipefail
          git rm -r --ignore-unmatch docs/superpowers .superpowers
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit cleanup branch
        if: steps.cleanup.outputs.has_changes == 'true'
        env:
          CLEANUP_BRANCH: automation/planning-artifact-cleanup
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$CLEANUP_BRANCH"
          git commit -m "chore: remove planning artifacts from main"
          git push --force-with-lease origin "$CLEANUP_BRANCH"

      - name: Create or update cleanup PR
        if: steps.cleanup.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          CLEANUP_BRANCH: automation/planning-artifact-cleanup
        run: |
          set -euo pipefail
          PR_URL=$(gh pr list \
            --base main \
            --head "$CLEANUP_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url // ""')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --base main \
              --head "$CLEANUP_BRANCH" \
              --title "chore: remove planning artifacts from main" \
              --body "Automated follow-up after a merge-queue landing to remove planning artifacts that should stay visible in the original PR but not remain on \`main\`. The cleanup branch is pushed with the repo deploy key so the normal CI workflow still runs before this PR is re-queued.")
          fi
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for cleanup PR
        if: steps.cleanup.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --auto "${{ steps.pr.outputs.url }}"
