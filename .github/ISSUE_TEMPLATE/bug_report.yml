name: Bug report
description: Something in SLICC broke, misbehaved, or otherwise melted. File a structured bug report.
title: '[bug]: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Clear repro steps and environment details help us (and the cone) debug far faster.

        Before submitting, please:
        - Search [existing issues](https://github.com/ai-ecoverse/slicc/issues?q=is%3Aissue) to avoid duplicates.
        - If this is a security issue, do NOT open a public issue — see `SECURITY.md` if present, or contact the maintainers directly.

  - type: dropdown
    id: float
    attributes:
      label: Float (runtime)
      description: Which SLICC runtime were you using when the bug occurred?
      options:
        - Standalone CLI (`npm run dev` / npx sliccy)
        - Chrome extension (side panel)
        - Electron / Sliccstart (macOS app)
        - Cloudflare worker (tray hub)
        - Multiple / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SLICC version
      description: Output of `sliccy --version`, the npm version, or commit SHA you built from.
      placeholder: '2.26.1 / commit abc1234'
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: 'macOS 15.4 / Windows 11 / Ubuntu 24.04'
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      description: Which Chrome/Chromium build and version. For the extension, also note Manifest V3 build channel.
      placeholder: 'Chrome 138.0.7204.92 (Stable)'
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`. SLICC requires Node >= 22 LTS.
      placeholder: 'v22.11.0'

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear, concise description of the bug. What did you observe?
      placeholder: 'When I clicked X, the cone replied with Y instead of Z.'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. Include shell commands, prompts, or VFS paths where relevant.
      placeholder: |
        1. Run `npm run dev`
        2. In the chat panel, prompt: "..."
        3. Observe the terminal output
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      description: |
        Paste relevant logs from the browser DevTools console, the Node server, or the offscreen document.
        Redact any secrets (PATs, API keys, OAuth tokens) before pasting.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, recordings, related issues, or anything else useful.

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have removed any secrets, tokens, or sensitive data from logs and screenshots.
          required: true
